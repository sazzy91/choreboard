<script>
const STORAGE_URL = "/.netlify/functions/storage";
window._binCache = null;
window._lastFetch = 0;
const MIN_FETCH_INTERVAL = 25000;
async function fetchBin() {
  const now = Date.now();
  if (window._binCache && (now - window._lastFetch) < MIN_FETCH_INTERVAL) return window._binCache;
  const r = await fetch(STORAGE_URL);
  if (!r.ok) throw new Error("read failed: " + r.status);
  const bin = await r.json();
  window._binCache = bin; window._lastFetch = now;
  return bin;
}
window.storage = {
  async get(key, shared) {
    try { const bin = await fetchBin(); const val = bin[key]; return val !== undefined ? { key, value: JSON.stringify(val) } : null; }
    catch(e) { console.error("storage.get:", e); return null; }
  },
  async set(key, value, shared) {
    try {
      let bin = window._binCache || {};
      bin[key] = JSON.parse(value); window._binCache = bin; window._lastFetch = Date.now();
      const w = await fetch(STORAGE_URL, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(bin) });
      if (!w.ok) { console.error("write failed:", w.status); return null; }
      console.log("Saved ✓"); return { key, value };
    } catch(e) { console.error("storage.set:", e); return null; }
  }
};
</script>

d);\n  const now = new Date();\n  const day = now.getDay() || 7;\n  const mon = new Date(now); mon.setDate(now.getDate() - (day - 1)); mon.setHours(0,0,0,0);\n  const sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23,59,59,999);\n  return date >= mon && date <= sun;\n}\n\nfunction getWeekPts(checks) {\n  let total = 0;\n  for (const k of Object.keys(checks))\n    if (isInCurrentWeek(k)) total += Object.values(checks[k]).filter(Boolean).length;\n  return total;\n}\n\nfunction getDayPts(checks) {\n  return Object.values(checks[todayKey()] || {}).filter(Boolean).length;\n}\n\n// Monetary value calculation \u2014 no cap above target, bonus pts earn proportionally\nfunction calcEarned(pts, target, amount, minPts) {\n  if (pts <= 0) return 0;\n  // When fully excused week (target=0), use base 65 target so bonus pts still earn\n  const effectiveTarget = (!target || target <= 0) ? 65 : target;\n  if (pts < minPts) return 0;\n  return parseFloat(((pts / effectiveTarget) * amount).toFixed(2));\n}\n\n\n\n\n// pending[kid][dateKey][taskId] = true means ticked but not yet approved\n// checks[kid][dateKey][taskId] = true means approved\n\nfunction getPendingDay(pending, kid, dk) {\n  return (pending?.[kid]?.[dk]) || {};\n}\n\nfunction getPendingDayCount(pending, kid) {\n  // count all pending across all days this week\n  let total = 0;\n  for (const dk of Object.keys(pending?.[kid] || {}))\n    if (isInCurrentWeek(dk)) total += Object.values(pending[kid][dk]).filter(Boolean).length;\n  return total;\n}\n\nfunction getApprovedWeekPts(checks, excuses, kid) {\n  return getWeekPtsWithExcuses(checks, excuses, kid);\n}\n\nfunction getPendingWeekPts(pending, kid, excuses) {\n  let total = 0;\n  for (const dk of Object.keys(pending?.[kid] || {})) {\n    if (!isInCurrentWeek(dk)) continue;\n    total += Object.values(pending[kid][dk]).filter(Boolean).length;\n  }\n  return total;\n}\n\nfunction netPts(checks, excuses, penalties, kid, bonuses, pending) {\n  const approved = getWeekPtsWithExcuses(checks, excuses, kid);\n  const pend = getPendingWeekPts(pending, kid, excuses);\n  return Math.max(0, approved + pend - getWeekPenalties(penalties, kid, excuses) + getWeekBonuses(bonuses, kid, excuses));\n}\n\nfunction netApprovedPts(checks, excuses, penalties, kid, bonuses) {\n  return Math.max(0, getWeekPtsWithExcuses(checks, excuses, kid) - getWeekPenalties(penalties, kid, excuses) + getWeekBonuses(bonuses, kid, excuses));\n}\n\n\nconst EXCUSE_REASONS = [\"Ill\", \"School trip\", \"Away\", \"Other\"];\nconst CHORES_PER_DAY = 13;\n\n// Returns list of excused day keys for a kid in the current week\nfunction getExcusedDays(excuses, kid) {\n  if (!excuses || !excuses[kid]) return [];\n  return Object.keys(excuses[kid]).filter(k => isInCurrentWeek(k));\n}\n\n// Target reduces by 13pts per excused day\nfunction getAdjustedTarget(baseTarget, excuses, kid) {\n  const excusedCount = getExcusedDays(excuses, kid).length;\n  return Math.max(0, baseTarget - excusedCount * CHORES_PER_DAY);\n}\n\n// Min pts reduced for excused days so kids aren't penalised for being ill\nfunction getAdjustedMin(baseMin, excuses, kid) {\n  const excusedCount = getExcusedDays(excuses, kid).length;\n  return Math.max(0, baseMin - excusedCount * CHORES_PER_DAY);\n}\n\n// Week pts: actual ticks on non-excused days + 13pts per excused day\nfunction getWeekPtsWithExcuses(checks, excuses, kid) {\n  const excusedDays = new Set(getExcusedDays(excuses, kid));\n  let earned = 0;\n  for (const k of Object.keys(checks || {})) {\n    if (!isInCurrentWeek(k)) continue;\n    if (excusedDays.has(k)) continue; // don't double count\n    earned += Object.values(checks[k]).filter(Boolean).length;\n  }\n  return earned + excusedDays.size * CHORES_PER_DAY;\n}\n\n\nconst PENALTY_TYPES = {\n  late:      { label: \"Late to school\", pts: 3, icon: \"\u23f1\ufe0f\" },\n  detention: { label: \"Detention\",      pts: 3, icon: \"\ud83d\udccb\" },\n};\n\nconst BONUS_TYPES = {\n  nodedetention: { label: \"No detention today\", pts: 3, icon: \"\ud83c\udf1f\" },\n  ontime:        { label: \"On time today\",       pts: 3, icon: \"\u2705\" },\n};\n\nfunction getWeekBonuses(bonuses, kid, excuses) {\n  if (!bonuses || !bonuses[kid]) return 0;\n  let total = 0;\n  for (const [dk, list] of Object.entries(bonuses[kid])) {\n    if (!isInCurrentWeek(dk)) continue;\n    total += list.reduce((s, b) => s + (b.pts || 0), 0);\n  }\n  return total;\n}\n\nfunction getDayBonuses(bonuses, kid, dk) {\n  if (!bonuses || !bonuses[kid]) return [];\n  return bonuses[kid][dk] || [];\n}\n\n\nfunction getWeekPenalties(penalties, kid, excuses) {\n  if (!penalties || !penalties[kid]) return 0;\n  let total = 0;\n  for (const [dk, list] of Object.entries(penalties[kid])) {\n    if (!isInCurrentWeek(dk)) continue;\n    total += list.reduce((s, p) => s + (p.pts || PENALTY_TYPES[p.type]?.pts || 0), 0);\n  }\n  return total;\n}\n\nfunction getDayPenalties(penalties, kid) {\n  if (!penalties || !penalties[kid]) return [];\n  return penalties[kid][todayKey()] || [];\n}\n\nfunction isFriday(dk) {\n  const [y,m,d] = dk.split(\"-\").map(Number);\n  return new Date(y,m-1,d).getDay() === 5;\n}\n\nfunction getTasksForDate(state, dk, kid) {\n  const k = kid || \"oliver\";\n  if (isFriday(dk)) {\n    const ft = state.fridayTasks;\n    return (ft && ft[k]) ? ft[k] : DEFAULT_FRIDAY_TASKS;\n  }\n  const t = state.tasks;\n  return (t && t[k]) ? t[k] : DEFAULT_TASKS;\n}\n\nfunction getDefaultKid() {\n  try {\n    const p = new URLSearchParams(window.location.search);\n    const k = (p.get(\"kid\") || \"\").toLowerCase();\n    return k === \"alfie\" ? \"alfie\" : \"oliver\";\n  } catch { return \"oliver\"; }\n}\n\nconst DEFAULT_TASKS = [\n  { id: 1,  name: \"Have breakfast\",                    section: \"Morning\",   schedule: false },\n  { id: 2,  name: \"Put breakfast stuff in dishwasher\", section: \"Morning\",   schedule: false },\n  { id: 3,  name: \"Brush teeth\",                       section: \"Mornin eTarget;\n  const aboveTarget = wkPts > effectiveTarget;\n  const ptsToMin = Math.max(0, minPts - wkPts);\n  const extraPts = Math.max(0, wkPts - effectiveTarget);\n  const extraEarned = aboveTarget ? parseFloat(((extraPts / effectiveTarget) * amount).toFixed(2)) : 0;\n  const displayPct = Math.min(Math.round(wkPts / effectiveTarget * 100), 999);\n\n  return (\n    <div style={{\n      background: aboveTarget ? APPROVED.bg : atTarget ? light : belowMin ? \"#FFF8F0\" : light,\n      border: `2px solid ${aboveTarget ? APPROVED.border : atTarget ? accent : belowMin ? \"#FAC775\" : accent}`,\n      borderRadius: 16, padding: \"14px 16px\", marginBottom: 16 }}>\n      <div style={{ display: \"flex\", alignItems: \"center\", justifyContent: \"space-between\", marginBottom: 10 }}>\n        <div>\n          <div style={{ fontSize: 11, fontWeight: 600, textTransform: \"uppercase\", letterSpacing: \"0.06em\", marginBottom: 2,\n            color: aboveTarget ? APPROVED.text : belowMin ? \"#BA7517\" : mid }}>\n            {aboveTarget ? \"\ud83c\udf1f Bonus money earned!\" : atTarget ? \"\ud83c\udf89 Full reward earned!\" : belowMin ? \"\ud83d\udd12 Earnings locked\" : \"\ud83d\udcb0 Earned so far\"}\n          </div>\n          <div style={{ fontSize: 32, fontWeight: 700, color: aboveTarget ? APPROVED.icon : belowMin ? \"#aaa\" : dark }}>\n            \u00a3{earned.toFixed(2)}\n          </div>\n          {belowMin && <div style={{ fontSize: 11, color: \"#BA7517\", marginTop: 2 }}>Need {ptsToMin} more pts to unlock</div>}\n          {aboveTarget && (\n            <div style={{ fontSize: 12, color: APPROVED.text, marginTop: 2 }}>\n              \u00a3{amount.toFixed(2)} + \u00a3{extraEarned.toFixed(2)} bonus\n            </div>\n          )}\n        </div>\n        <div style={{ textAlign: \"right\" }}>\n          <div style={{ fontSize: 11, color: \"#aaa\", marginBottom: 2 }}>\n{aboveTarget ? <span style={{ color: APPROVED.text }}>{extraPts} bonus pts</span> : `of \u00a3${amount.toFixed(2)}`}\n          </div>\n          <div style={{ fontSize: 22, fontWeight: 700,\n            color: aboveTarget ? APPROVED.icon : belowMin ? \"#BA7517\" : mid }}>{displayPct}%</div>\n        </div>\n      </div>\n      {(() => {\n        const appPct = target > 0 ? Math.min(100, Math.round((approvedPts||0) / target * 100)) : 100;\n        const pendPct = target > 0 ? Math.min(100 - appPct, Math.round((pendingPts||0) / target * 100)) : 0;\n        return (\n          <div style={{ height: 10, borderRadius: 99, background: \"#e8e8e8\", overflow: \"hidden\", marginBottom: 6, position: \"relative\" }}>\n            <div style={{ position: \"absolute\", left: 0, top: 0, height: \"100%\", borderRadius: \"99px 0 0 99px\",\n              width: `${appPct}%`, background: belowMin ? \"#9CA3AF\" : APPROVED.icon,\n              transition: \"width 0.4s\" }} />\n            <div style={{ position: \"absolute\", left: `${appPct}%`, top: 0, height: \"100%\",\n              borderRadius: appPct === 0 ? 99 : \"0 99px 99px 0\",\n              width: `${pendPct}%`, background: \"#FAC775\", transition: \"width 0.4s\", opacity: 0.7 }} />\n          </div>\n        );\n      })()}\n      <div style={{ display: \"flex\", justifyContent: \"space-between\", fontSize: 11, color: \"#aaa\", marginBottom: pendingPts > 0 ? 4 : 0 }}>\n        <span>{wkPts} pts</span>\n        <span style={{ color: belowMin ? \"#BA7517\" : aboveTarget ? \"#BA7517\" : \"#aaa\" }}>\n          {belowMin\n            ? `Earn ${ptsToMin} more pts to unlock reward (min ${minPts} pts)`\n            : aboveTarget\n              ? `65 pts = \u00a3${amount.toFixed(2)} \u00b7 every extra pt = \u00a3${(amount/65).toFixed(2)}`\n              : `65 pts = \u00a3${amount.toFixed(2)}`}\n        </span>\n      </div>\n\n      {!isWeekend && dayPts !== undefined && (\n        <div style={{ marginTop: 8, paddingTop: 8, borderTop: \"1px solid #e8e8e8\" }}>\n          <div style={{ display: \"flex\", justifyContent: \"space v style={{ fontSize: 14, fontWeight: 700, color: k.dark }}>{friendlyDate(viewDateKey)}</div>\n          {!isToday && <div style={{ fontSize: 11, color: k.mid, marginTop: 1 }}>Read-only \u2014 past day</div>}\n        </div>\n        <button onClick={goForward} style={{ width: 34, height: 34, borderRadius: \"50%\", border: \"none\", background: isToday ? \"transparent\" : \"transparent\", cursor: isToday ? \"default\" : \"pointer\", fontSize: 20, color: isToday ? \"#ccc\" : k.mid, display: \"flex\", alignItems: \"center\", justifyContent: \"center\" }}>\u203a</button>\n      </div>\n\n      {/* Stats row */}\n      <div style={{ display: \"grid\", gridTemplateColumns: \"1fr 1fr 1fr\", gap: 10, marginBottom: 14 }}>\n        {[[isToday ? \"Today\" : \"That day\", weekend ? \"\u2014\" : dayPts], [\"This week\", wkPts], [\"To go\", weekend ? wkPts >= target ? \"Done!\" : toGo : toGo]].map(([lbl, val]) => (\n          <div key={lbl} style={{ background: k.light, borderRadius: 14, padding: \"14px 10px\", textAlign: \"center\" }}>\n            <div style={{ fontSize: 22, fontWeight: 700, color: k.dark }}>{val}</div>\n            <div style={{ fontSize: 11, color: k.mid, marginTop: 2 }}>{lbl}</div>\n          </div>\n        ))}\n      </div>\n\n      {/* Money card */}\n      <MoneyCard wkPts={wkPts} approvedPts={approvedWkPts} pendingPts={pendingWkPts} target={target} amount={amount} minPts={minPts}\n        accent={k.accent} light={k.light} dark={k.dark} mid={k.mid} dayPts={dayPts}\n        dayApprovedPts={viewExcused ? 13 : Object.values(viewDateApproved).filter(Boolean).length}\n        dayPendingPts={viewExcused ? 0 : Object.values(viewDatePending).filter(Boolean).length}\n        isWeekend={weekend} />\n\n      {/* Weekend screen or chore list */}\n      {/* Penalty banner for today */}\n      {isWeekdayKey(viewDateKey) && !viewExcused && viewDatePenalties.length > 0 && (\n        <div style={{ background: \"#FCEBEB\", border: \"1px solid #F7C1C1\", borderRadius: 12,        <span style={{ fontSize: 15, fontWeight: 700, color: \"#085041\" }}>+{viewDateBonuses.reduce((s,b) => s+b.pts, 0)}pts</span>\n        </div>\n      )}\n\n      {/* Excused day banner */}\n      {isWeekdayKey(viewDateKey) && viewExcused && (\n        <div style={{ textAlign: \"center\", background: \"#E1F5EE\", border: \"1px solid #1D9E75\", borderRadius: 14, padding: \"16px\", marginBottom: 16 }}>\n          <div style={{ fontSize: 24, marginBottom: 6 }}>\ud83c\udfe5</div>\n          <div style={{ fontSize: 15, fontWeight: 600, color: \"#085041\" }}>Day excused</div>\n          <div style={{ fontSize: 13, color: \"#0F6E56\", marginTop: 4 }}>\n            {(excuses[kid]||{})[viewDateKey]?.reason} \u2014 this day was excused. Full points awarded! \ud83c\udf89\n          </div>\n        </div>\n      )}\n\n      {weekend ? <WeekendScreen kid={kid} dateKey={viewDateKey} /> : viewExcused ? null : (\n        <>\n          {[\"Morning\",\"Afternoon\",\"Evening\"].map(sec => {\n            const tasks = activeTasks.filter(t => t.section === sec);\n            if (!tasks.length) return null;\n            const open = isSectionOpen(sec);\n            return (\n              <div key={sec}>\n                <div style={{ fontSize: 11, fontWeight: 600, color: \"#888\", textTransform: \"uppercase\",\n                  letterSpacing: \"0.07em\", marginBottom: 6, marginTop: 12, display: \"flex\", alignItems: \"center\", gap: 6 }}>\n                  {sec}\n                  {!open && isToday && <span style={{ fontSize: 10, color: \"#BA7517\", background: \"#FAEEDA\", padding: \"1px 7px\", borderRadius: 99, fontWeight: 500, letterSpacing: 0 }}>\ud83d\udd12 locked</span>}\n                </div>\n                {!open && isToday && <LockBanner />}\n                {tasks.map(t => {\n                  if (t.schedule) return <ScheduleItem key={t.id} task={t} big={true} isGrounded={t.canGround && !!(state.grounded||{})[kid]} onToggleGround={t.canGround ? () => dispatch({ type: \"SET_GROUNDED\", kid, value: !(state.grounded||{})[kid] }) : undefined} />;\n                  const approved = !!(viewDateApproved[t.id]);\n                  const isPend = !approved && !!(viewDatePending[t.id]);\n                  const rejReason = !approved && !isPend && viewDateRejections[t.id];\n                  const timeLocked = isToday && !open;\n                  const readOnly = !isToday;\n                  return (\n                    <div key={t.id} style={{ marginBottom: 7 }}>\n                      <div onClick={() => !timeLocked && !readOnly && !rejReason && dispatch({ type: \"TOGGLE\", kid, taskId: t.id })}\n                        style={{ display: \"flex\", alignItems: \"center\", gap: 14, padding: \"14px 16px\",\n                          background: timeLocked ? \"#F8F8F8\" : approved ? APPROVED.bg : isPend ? PENDING.bg : rejReason ? \"#FCEBEB\" : \"#fff\",\n                          border: `1.5px solid ${timeLocked ? \"#e0e0e0\" : approved ? APPROVED.border : isPend ? PENDING.border : rejReason ? \"#F7C1C1\" : \"#e8e8e8\"}`,\n                          borderRadius: rejReason ? \"14px 14px 0 0\" : 14,\n                          cursor: timeLocked || readOnly || rejReason ? \"default\" : \"pointer\",\n                          opacity: timeLocked ? 0.55 : 1, minHeight: 52 }}>\n                        <div style={{ width: 26, height: 26, borderRadius: \"50%\", flexShrink: 0, display: \"flex\", alignItems: \"center\", justifyContent: \"center\",\n                          background: timeLocked ? \"#eee\" : approved ? APPROVED.icon : isPend ? PENDING.icon : rejReason ? \"#F7C1C1\" : \"transparent\",\n                          border: `2px solid ${timeLocked ? \"#ccc\" : approved ? APPROVED.icon : isPend ? PENDING.icon : rejReason ? \"#F7C1C1\" : \"#ccc\"}` }}>\n                          {approved && <span style={{ color: \"#fff\", fontSize: 14 }}>\u2713</span>}\n                          {isPend && <span style={{ fontSize: 13 }}>\u23f3</span>}\n                          {rejReason && <span style={{ fontSize: 13 }}>\u2717</span>}\n                          {timeLocked && <span style={{ fontSize: 12 }}>\ud83d\udd12</span>}\n                        </div>\n                        <span style={{ flex: 1, fontSize: 15, color: timeLocked ? \"#aaa\" : rejReason ? \"#791F1F\" : \"#222\" }}>{t.name}</span>\n                        {!timeLocked && (\n                          <span style={{ fontSize: 11, padding: \"3px 9px\", borderRadius: 99, fontWeight: 500,\n                            color: approved ? APPROVED.text : isPend ? PENDING.icon : rejReason ? \"#A32D2D\" : \"#ccc\",\n                            background: approved ? APPROVED.bg : isPend ? PENDING.bg : rejReason ? \"#F7C1C1\" : \"#f5f5f5\" }}>\n                            {approved ? \"\u2713 approved\" : isPend ? \"\u23f3 pending\" : rejReason ? \"\u2717 rejected\" : \"1pt\"}\n                          </span>\n                        )}\n                      </div>\n                      {rejReason && (\n                        <div style={{ background: \"#FCEBEB\", border: \"1px solid #F7C1C1\", borderTop: \"none\",\n                          borderRadius: \"0 0 14px 14px\", padding: \"6px 14px 10px\", fontSize: 12, color: \"#791F1F\" }}>\n                          \ud83d\udcac {rejReason}\n                        </div>\n                      )}\n                    </div>\n                  );\n                })}\n              </div>\n            );\n          })}\n          {dayDone && <div style={{ textAlign: \"center\", marginTop: 12, fontSize: 14, fontWeight: 600, color: k.mid }}>\u2b50 All today's chores done!</div>}\n          {weekDone && <div style={{ textAlign: \"center\", marginTop: 8, fontSize: 14, fontWeight: 600, color: k.mid }}>\ud83c\udf89 Full week target hit! \u00a3{amount.toFixed(2)} earned!</div>}\n        </>\n      )}\n    </div>\n  );\n}\n\n\n// \u2500\u2500 Penalty manager \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction PenaltyManager({ state, dispatch, defaultKid }) {\n  const [kid, setKid] = useState(defaultKid || \"oliver\");\n  useEffect(() => { if (defaultKid) setKid(defaultKid); }, [defaultKid]);\n  const [dateKey, setDateKey] = useState(todayKey());\n  const [saved, setSaved] = useState(null);\n  const penalties = state.penalties || {};\n  const kidPens = penalties[kid] || {};\n  const weekPens = Object.entries(kidPens).filter(([dk]) => isInCurrentWeek(dk));\n  const totalPenPts = weekPens.reduce((s,[,list]) => s + list.reduce((ss,p) => ss + (p.pts || PENALTY_TYPES[p.type]?.pts||0), 0), 0);\n\n  const [customPenPts, setCustomPenPts] = useState(3);\n  const [customPenReason, setCustomPenReason] = useState(\"\");\n\n  const addPenalty = (type) => {\n    dispatch({ type: \"ADD_PENALTY\", kid, dateKey, penaltyType: type });\n    setSaved(type); setTimeout(() => setSaved(null), 1500);\n  };\n\n  const addCustomPenalty = () => {\n    if (!customPenReason.trim()) return;\n    dispatch({ type: \"ADD_PENALTY\", kid, dateKey, penaltyType: \"custom\",\n      customPts: Number(customPenPts), customLabel: customPenReason.trim() });\n    setSaved(\"custom\"); setCustomPenReason(\"\");\n    setTimeout(() => setSaved(null), 1500);\n  };\n\n  const dayLabel = (dk) => {\n    const [y,m,d] = dk.split(\"-\").map(Number);\n    return new Date(y,m-1,d).toLocaleDateString(\"en-GB\", { weekday: \"short\", day: \"numeric\", month: \"short\" });\n  };\n\n  return (\n    <div style={{ background: \"#fff\", border: \"1px solid #eee\", borderRadius: 14, padding: 16, marginBottom: 12 }}>\n      <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 4 }}>Apply penalty</div>\n      <div style={{ fontSize: 12, color: \"#888\", marginBottom: 14 }}>\n        Late to school deducts 2pts \u00b7 Detention deducts 3pts \u00b7 Multiple penalties stack on the same day.\n      </div>\n      <div style={{ display: \"flex\", gap: 8, marginBottom: 12 }}>\n        {[\"oliver\",\"alfie\"].map(id => (\n          <button key={id} onClick={() => setKid(id)} style={{\n            flex: 1, padding: \"8px\", borderRadius: 10, border: `2px solid ${kid===id ? KIDS[id].accent : \"transparent\"}`,\n            background: KIDS[id].light, color: KIDS[id].dark, fontWeight: 600, fontSize: 13, cursor: \"pointer\",\n          }}>{KIDS[id].label}</button>\n        ))}\n      </div>\n      <div style={{ marginBottom: 12 }}>\n        <label style={{ fontSize: 12, color: \"#888\", display: \"block\", marginBottom: 4 }}>Date of incident</label>\n        <input type=\"date\" value={dateKey} onChange={e => setDateKey(e.target.value)}\n          style={{ width: \"100%\", padding: \"7px 10px\", borderRadius: 8, border: \"1px solid #ddd\", fontSize: 13 }} />\n      </div>\n      <div style={{ display: \"flex\", gap: 8, marginBottom: 8 }}>\n        {Object.entries(PENALTY_TYPES).map(([type, info]) => (\n          <button key={type} onClick={() => addPenalty(type)} style={{\n            flex: 1, padding: \"10px 8px\", borderRadius: 10,\n            border: saved===type ? \"2px solid #E24B4A\" : \"1.5px solid #F7C1C1\",\n            background: saved===type ? \"#FCEBEB\" : \"#FFF5F5\",\n            cursor: \"pointer\", fontSize: 13, fontWeight: 600, color: \"#A32D2D\",\n          }}>\n            {info.icon} {info.label}<br />\n            <span style={{ fontSize: 11, fontWeight: 400 }}>\u2212{info.pts} pts</span>\n          </button>\n        ))}\n      </div>\n      {/* Custom penalty */}\n      <div style={{ background: \"#fff8f8\", borderRadius: 10, padding: \"10px 12px\", marginBottom: 10, border: \"1px solid #F7C1C1\" }}>\n        <div style={{ fontSize: 12, color: \"#A32D2D\", marginBottom: 8, fontWeight: 500 }}>\u2795 Custom penalty</div>\n        <div style={{ display: \"flex\", gap: 8, marginBottom: 8 }}>\n          <div style={{ width: 80 }}>\n            <label style={{ fontSize: 11, color: \"#888\", display: \"block\", marginBottom: 3 }}>Points</label>\n            <input type=\"number\" value={customPenPts} min={1} max={13} onChange={e => setCustomPenPts(e.target.value)}\n              style={{ width: \"100%\", padding: \"7px 8px\", borderRadius: 8, border: \"1px solid #ddd\", fontSize: 13 }} />\n          </div>\n          <div style={{ flex: 1 }}>\n            <label style={{ fontSize: 11, color: \"#888\", display: \"block\", marginBottom: 3 }}>Reason</label>\n            <input value={customPenReason} onChange={e => setCustomPenReason(e.target.value)}\n              placeholder=\"e.g. Rude to sibling, broke a rule...\"\n              style={{ width: \"100%\", padding: \"7px 10px\", borderRadius: 8, border: \"1px solid #ddd\", fontSize: 13 }} />\n          </div>\n        </div>\n        <button onClick={addCustomPenalty} style={{\n          padding: \"7px 14px\", borderRadius: 8, background: \"#A32D2D\", color: \"#fff\",\n          border: \"none\", cursor: \"pointer\", fontSize: 13, fontWeight: 600,\n        }}>\u2212 Apply custom penalty</button>\n      </div>\n      {saved && <div style={{ fontSize: 12, color: \"#A32D2D\", marginBottom: 8 }}>\u2713 Applied!</div>}\n      {weekPens.length > 0 && (\n        <div style={{ marginTop: 12 }}>\n          <div style={{ fontSize: 12, fontWeight: 600, color: \"#888\", marginBottom: 8, textTransform: \"uppercase\", letterSpacing: \"0.05em\" }}>\n            This week \u2014 {KIDS[kid].label} &nbsp;\n            <span style={{ color: \"#A32D2D\", background: \"#FCEBEB\", padding: \"1px 7px\", borderRadius: 99 }}>\u2212{totalPenPts} pts total</span>\n          </div>\n          {weekPens.map(([dk, list]) => (\n            <div key={dk} style={{ marginBottom: 8 }}>\n              <div style={{ fontSize: 12, color: \"#888\", marginBottom: 4 }}>{dayLabel(dk)}</div>\n              {list.map(p => (\n                <div key={p.id} style={{ display: \"flex\", alignItems: \"center\", gap: 8, padding: \"7px 10px\",\n                  background: \"#FCEBEB\", border: \"1px solid #F7C1C1\", borderRadius: 10, marginBottom: 4, fontSize: 13 }}>\n                  <span>{p.icon||PENALTY_TYPES[p.type]?.icon||'\u26a0\ufe0f'}</span>\n                  <span style={{ flex: 1, color: \"#791F1F\" }}>{p.label||PENALTY_TYPES[p.type]?.label||'Penalty'}</span>\n                  <span style={{ fontWeight: 700, color: \"#A32D2D\" }}>\u2212{p.pts||PENALTY_TYPES[p.type]?.pts||3}pts</span>\n                  <button onClick={() => dispatch({ type: \"REMOVE_PENALTY\", kid, dateKey: dk, id: p.id })}\n                    style={{ padding: \"3px 8px\", borderRadius: 6, border: \"1px solid #F7C1C1\", background: \"transparent\", cursor: \"pointer\", fontSize: 12, color: \"#A32D2D\" }}>\n                    \u2715\n                  </button>\n                </div>\n              ))}\n            </div>\n          ))}\n        </div>\n      )}\n    </div>\n  );\n}\n\n\n// \u2500\u2500 Bonus manager \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction BonusManager({ state, dispatch, defaultKid }) {\n  const [kid, setKid] = useState(defaultKid || \"oliver\");\n  useEffect(() => { if (defaultKid) setKid(defaultKid); }, [defaultKid]);\n  const [dateKey, setDateKey] = useState(todayKey());\n  const [customPts, setCustomPts] = useState(2);\n  const [customReason, setCustomReason] = useState(\"\");\n  const [saved, setSaved] = useState(null);\n  const bonuses = state.bonuses || {};\n  const kidBonuses = bonuses[kid] || {};\n  const weekBonuses = Object.entries(kidBonuses).filter(([dk]) => isInCurrentWeek(dk));\n  const totalBonusPts = weekBonuses.reduce((s,[,list]) => s + list.reduce((ss,b) => ss + (b.pts||0), 0), 0);\n  const k = KIDS[kid];\n\n  const addBonus = (type, pts, label, icon) => {\n    dispatch({ type: \"ADD_BONUS\", kid, dateKey, bonusType: type, pts, label, icon });\n    setSaved(label); setTimeout(() => setSaved(null), 1500);\n  };\n\n  const addCustom = () => {\n    if (!customReason.trim()) return;\n    addBonus(\"custom\", Number(customPts), customReason.trim(), \"\ud83c\udf81\");\n    setCustomReason(\"\");\n  };\n\n  const dayLabel = (dk) => {\n    const [y,m,d] = dk.split(\"-\").map(Number);\n    return new Date(y,m-1,d).toLocaleDateString(\"en-GB\", { weekday: \"short\", day: \"numeric\", month: \"short\" });\n  };\n\n  return (\n    <div style={{ background: \"#fff\", border: \"1px solid #eee\", borderRadius: 14, padding: 16, marginBottom: 12 }}>\n      <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 4 }}>Award bonus points</div>\n      <div style={{ fontSize: 12, color: \"#888\", marginBottom: 14 }}>\n        No detention today +3pts \u00b7 On time today +2pts \u00b7 Or add a custom reward with your own reason.\n      </div>\n\n      <div style={{ display: \"flex\", gap: 8, marginBottom: 12 }}>\n        {[\"oliver\",\"alfie\"].map(id => (\n          <button key={id} onClick={() => setKid(id)} style={{\n            flex: 1, padding: \"8px\", borderRadius: 10, border: `2px solid ${kid===id ? KIDS[id].accent : \"transparent\"}`,\n            background: KIDS[id].light, color: KIDS[id].dark, fontWeight: 600, fontSize: 13, cursor: \"pointer\",\n          }}>{KIDS[id].label}</button>\n        ))}\n      </div>\n\n      <div style={{ marginBottom: 12 }}>\n        <label style={{ fontSize: 12, color: \"#888\", display: \"block\", marginBottom: 4 }}>Date</label>\n        <input type=\"date\" value={dateKey} onChange={e => setDateKey(e.target.value)}\n          style={{ width: \"100%\", padding: \"7px 10px\", borderRadius: 8, border: \"1px solid #ddd\", fontSize: 13 }} />\n      </div>\n\n      {/* Preset bonus buttons */}\n      <div style={{ display: \"flex\", gap: 8, marginBottom: 10 }}>\n        {Object.entries(BONUS_TYPES).map(([type, info]) => (\n          <button key={type} onClick={() => addBonus(type, info.pts, info.label, info.icon)} style={{\n            flex: 1, padding: \"10px 8px\", borderRadius: 10,\n            border: saved===info.label ? `2px solid ${k.accent}` : `1.5px solid ${k.accent}40`,\n            background: saved===info.label ? k.light : `${k.accent}10`,\n            cursor: \"pointer\", fontSize: 13, fontWeight: 600, color: k.dark,\n          }}>\n            {info.icon} {info.label}<br />\n            <span style={{ fontSize: 11, fontWeight: 400 }}>+{info.pts} pts</span>\n          </button>\n        ))}\n      </div>\n\n      {/* Custom bonus */}\n      <div style={{ background: \"#f9f9f9\", borderRadius: 10, padding: \"10px 12px\", marginBottom: 10 }}>\n        <div style={{ fontSize: 12, color: \"#888\", marginBottom: 8, fontWeight: 500 }}>\ud83c\udf81 Custom bonus</div>\n        <div style={{ display: \"flex\", gap: 8, marginBottom: 8 }}>\n          <div style={{ width: 80 }}>\n            <label style={{ fontSize: 11, color: \"#888\", display: \"block\", marginBottom: 3 }}>Points</label>\n            <input type=\"number\" value={customPts} min={1} max={13} onChange={e => setCustomPts(e.target.value)}\n              style={{ width: \"100%\", padding: \"7px 8px\", borderRadius: 8, border: \"1px solid #ddd\", fontSize: 13 }} />\n          </div>\n          <div style={{ flex: 1 }}>\n            <label style={{ fontSize: 11, color: \"#888\", display: \"block\", marginBottom: 3 }}>Reason</label>\n            <input value={customReason} onChange={e => setCustomReason(e.target.value)}\n              placeholder=\"e.g. Helped a friend, great attitude...\"\n              style={{ width: \"100%\", padding: \"7px 10px\", borderRadius: 8, border: \"1px solid #ddd\", fontSize: 13 }} />\n          </div>\n        </div>\n        <button onClick={addCustom} style={{\n          padding: \"7px 14px\", borderRadius: 8, background: k.accent, color: \"#fff\",\n          border: \"none\", cursor: \"pointer\", fontSize: 13, fontWeight: 600,\n        }}>+ Award custom bonus</button>\n      </div>\n\n      {saved && <div style={{ fontSize: 12, color: \"#1D9E75\", marginBottom: 8 }}>\u2713 {saved} awarded!</div>}\n\n      {/* This week's bonuses */}\n      {weekBonuses.length > 0 && (\n        <div style={{ marginTop: 12 }}>\n          <div style={{ fontSize: 12, fontWeight: 600, color: \"#888\", marginBottom: 8, textTransform: \"uppercase\", letterSpacing: \"0.05em\" }}>\n            This week \u2014 {KIDS[kid].label} &nbsp;\n            <span style={{ color: \"#085041\", background: \"#E1F5EE\", padding: \"1px 7px\", borderRadius: 99 }}>+{totalBonusPts} pts total</span>\n          </div>\n          {weekBonuses.map(([dk, list]) => (\n            <div key={dk} style={{ marginBottom: 8 }}>\n              <div style={{ fontSize: 12, color: \"#888\", marginBottom: 4 }}>{dayLabel(dk)}</div>\n              {list.map(b => (\n                <div key={b.id} style={{ display: \"flex\", alignItems: \"center\", gap: 8, padding: \"7px 10px\",\n                  background: \"#E1F5EE\", border: \"1px solid #9FE1CB\", borderRadius: 10, marginBottom: 4, fontSize: 13 }}>\n                  <span>{b.icon || \"\ud83c\udf1f\"}</span>\n                  <span style={{ flex: 1, color: \"#085041\" }}>{b.label}</span>\n                  <span style={{ fontWeight: 700, color: \"#085041\" }}>+{b.pts}pts</span>\n                  <button onClick={() => dispatch({ type: \"REMOVE_BONUS\", kid, dateKey: dk, id: b.id })}\n                    style={{ padding: \"3px 8px\", borderRadius: 6, border: \"1px solid #9FE1CB\", background: \"transparent\", cursor: \"pointer\", fontSize: 12, color: \"#085041\" }}>\n                    \u2715\n                  </button>\n                </div>\n              ))}\n            </div>\n          ))}\n        </div>\n      )}\n    </div>\n  );\n}\n\n// \u2500\u2500 Excuse manager \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction ExcuseManager({ state, dispatch, defaultKid }) {\n  const [kid, setKid] = useState(defaultKid || \"oliver\");\n  useEffect(() => { if (defaultKid) setKid(defaultKid); }, [defaultKid]);\n  const [dateKey, setDateKey] = useState(todayKey());\n  const [reason, setReason] = useState(\"Ill\");\n  const [note, setNote] = useState(\"\");\n  const [saved, setSaved] = useState(false);\n  const excuses = state.excuses || {};\n  const kidExcuses = excuses[kid] || {};\n  const weekExcuses = Object.entries(kidExcuses).filter(([k]) => isInCurrentWeek(k));\n  const adjTarget = getAdjustedTarget(state.rewards.target, excuses, kid);\n  const adjMin = getAdjustedMin(state.rewards.minPts || 45, excuses, kid);\n\n  const handleExcuse = () => {\n    dispatch({ type: \"EXCUSE_DAY\", kid, dateKey, reason, note });\n    setSaved(true); setNote(\"\");\n    setTimeout(() => setSaved(false), 2000);\n  };\n\n  const dayLabel = (dk) => {\n    const [y,m,d] = dk.split(\"-\").map(Number);\n    return new Date(y,m-1,d).toLocaleDateString(\"en-GB\", { weekday: \"short\", day: \"numeric\", month: \"short\" });\n  };\n\n  return (\n    <div style={{ background: \"#fff\", border: \"1px solid #eee\", borderRadius: 14, padding: 16, marginBottom: 12 }}>\n      <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 4 }}>Excuse a day</div>\n      <div style={{ fontSize: 12, color: \"#888\", marginBottom: 14 }}>\n        Excused days are written off \u2014 the target drops by 13pts and full points are credited for that day.\n      </div>\n      <div style={{ display: \"flex\", gap: 8, marginBottom: 12 }}>\n        {[\"oliver\",\"alfie\"].map(id => (\n          <button key={id} onClick={() => setKid(id)} style={{\n            flex: 1, padding: \"8px\", borderRadius: 10, border: `2px solid ${kid===id ? KIDS[id].accent : \"transparent\"}`,\n            background: KIDS[id].light, color: KIDS[id].dark, fontWeight: 600, fontSize: 13, cursor: \"pointer\",\n          }}>{KIDS[id].label}</button>\n        ))}\n      </div>\n      <div style={{ display: \"flex\", gap: 8, marginBottom: 8, flexWrap: \"wrap\" }}>\n        <div style={{ flex: 1, minWidth: 130 }}>\n          <label style={{ fontSize: 12, color: \"#888\", display: \"block\", marginBottom: 4 }}>Date</label>\n          <input type=\"date\" value={dateKey} onChange={e => setDateKey(e.target.value)}\n            style={{ width: \"100%\", padding: \"7px 10px\", borderRadius: 8, border: \"1px solid #ddd\", fontSize: 13 }} />\n        </div>\n        <div style={{ flex: 1, minWidth: 120 }}>\n          <label style={{ fontSize: 12, color: \"#888\", display: \"block\", marginBottom: 4 }}>Reason</label>\n          <select value={reason} onChange={e => setReason(e.target.value)}\n            style={{ width: \"100%\", padding: \"7px 10px\", borderRadius: 8, border: \"1px solid #ddd\", fontSize: 13 }}>\n            {EXCUSE_REASONS.map(r => <option key={r}>{r}</option>)}\n          </select>\n        </div>\n      </div>\n      <input value={note} onChange={e => setNote(e.target.value)} placeholder=\"Optional note (e.g. school trip to London)\"\n        style={{ width: \"100%\", padding: \"7px 10px\", borderRadius: 8, border: \"1px solid #ddd\", fontSize: 13, marginBottom: 10 }} />\n      <div style={{ display: \"flex\", alignItems: \"center\", gap: 10, marginBottom: 14 }}>\n        <button onClick={handleExcuse} style={{ padding: \"8px 16px\", borderRadius: 8, background: \"#1D9E75\", color: \"#fff\", border: \"none\", cursor: \"pointer\", fontSize: 13, fontWeight: 600 }}>\n          \u2713 Excuse this day\n        </button>\n        {saved && <span style={{ fontSize: 13, color: \"#1D9E75\" }}>Saved!</span>}\n      </div>\n      {weekExcuses.length > 0 && (\n        <div>\n          <div style={{ fontSize: 12, fontWeight: 600, color: \"#888\", marginBottom: 8, textTransform: \"uppercase\", letterSpacing: \"0.05em\" }}>\n            This week \u2014 {KIDS[kid].label}\n          </div>\n          {weekExcuses.map(([dk, ex]) => (\n            <div key={dk} style={{ display: \"flex\", alignItems: \"center\", gap: 8, padding: \"8px 10px\",\n              background: \"#E1F5EE\", border: \"1px solid #9FE1CB\", borderRadius: 10, marginBottom: 6, fontSize: 13 }}>\n              <span>\ud83c\udfe5</span>\n              <span style={{ flex: 1, color: \"#085041\" }}><strong>{dayLabel(dk)}</strong> \u2014 {ex.reason}{ex.note ? ` (${ex.note})` : \"\"}</span>\n              <button onClick={() => dispatch({ type: \"REMOVE_EXCUSE\", kid, dateKey: dk })}\n                style={{ padding: \"3px 8px\", borderRadius: 6, border: \"1px solid #9FE1CB\", background: \"transparent\", cursor: \"pointer\", fontSize: 12, color: \"#0F6E56\" }}>\n                \u2715 Remove\n              </button>\n            </div>\n          ))}\n          <div style={{ fontSize: 12, color: \"#888\", marginTop: 8 }}>\n            Adjusted target this week: <strong>{adjTarget} pts</strong> \u00b7 Minimum: <strong>{adjMin} pts</strong>\n          </div>\n        </div>\n      )}\n    </div>\n  );\n}\n\n\n// \u2500\u2500 History tab content \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction HistoryTabContent({ state, dispatch, TEST_DATA, hasTestData, target, amount, minPts, getDayBreakdown, btn }) {\n  const [expandedIndex, setExpandedIndex] = useState(null);\n  const [expandedKid, setExpandedKid] = useState(\"oliver\");\n\n  const calcEarnedLocal = (pts, tgt, amt, mn) => {\n    if (pts < mn) return 0;\n    return Math.min(amt, parseFloat(((pts / tgt) * amt).toFixed(2)));\n  };\n\n  return (\n    <div>\n      {/* Test data controls */}\n      <div style={{ marginBottom: 16, padding: \"10px 14px\", background: \"#f7f7ff\", borderRadius: 12, border: \"1px solid #e8e5ff\" }}>\n        <div style={{ display: \"flex\", alignItems: \"center\", gap: 8, marginBottom: hasTestData ? 8 : 0 }}>\n          <span style={{ fontSize: 12, color: \"#534AB7\", flex: 1 }}>\ud83e\uddea Preview with test data</span>\n          {!hasTestData\n            ? <button onClick={() => dispatch({\n                type: \"LOAD_TEST_CHECKS\",\n                checks: {\n    oliver: {\n      \"2026-06-01\": {'1': true, '2': true, '3': true, '4': true, '5': true, '6': true, '7': true, '9': true, '10': true, '11': true, '12': true, '13': true, '16': true},\n      \"2026-06-02\": {'1': true, '2': true, '3': true, '4': true, '5': true, '6': true, '7': true, '9': true, '10': true, '11': true, '12': true, '13': true, '16': true},\n      \"2026-06-03\": {'1': true, '2': true, '3': true, '4': true, '5': true, '6': true, '7': true, '9': true, '10': true, '11': true},\n      \"2026-06-05\": {'1': true, '2': true, '3': true, '4': true, '5': true, '6': true, '7': true, '9': true, '10': true, '11': true, '12': true, '13': true, '16': true},\n    },\n    alfie: {\n      \"2026-06-01\": {'1': true, '2': true, '3': true, '4': true, '5': true, '6': true, '7': true, '9': true, '10': true, '11': true, '12': true, '13': true, '16': true},\n      \"2026-06-02\": {'1': true, '2': true, '3': true, '5': true, '6': true, '7': true, '9': true, '10': true, '11': true, '12': true},\n      \"2026-06-03\": {'1': true, '2': true, '3': true, '4': true, '5': true, '6': true, '7': true, '9': true, '10': true, '11': true, '12': true, '13': true, '16': true},\n      \"2026-06-04\": {'1': true, '2': true, '3': true, '4': true, '5': true, '6': true, '7': true, '9': true, '10': true, '11': true, '12': true, '13': true, '16': true},\n      \"2026-06-05\": {'1': true, '2': true, '3': true, '4': true, '5': true, '6': true, '7': true, '9': true, '10': true, '11': true},\n    },\n  },\n                excuses: {\n    oliver: { \"2026-06-04\": { reason: \"Ill\", note: \"temperature, stayed in bed\" } },\n    alfie: {},\n  },\n                penalties: {\n    oliver: {},\n    alfie: { \"2026-06-03\": [{ type: \"detention\", id: 9999001 }] },\n  },\n                historyEntry: { week: \"1 Jun 2026\", oliverPts: 62, alfiePts: 56, paid: false, loggedAt: \"2026-06-05T20:00:00Z\", auto: true },\n              })}\n                style={{ padding: \"6px 14px\", borderRadius: 8, background: \"#7F77DD\", color: \"#fff\", border: \"none\", cursor: \"pointer\", fontSize: 12, fontWeight: 600 }}>\n                Load test data\n              </button>\n            : <button onClick={() => dispatch({ type: \"CLEAR_TEST_CHECKS\", days: ['2026-06-01', '2026-06-02', '2026-06-03', '2026-06-04', '2026-06-05'], weekLabel: \"1 Jun 2026\" })}\n                style={{ padding: \"6px 14px\", borderRadius: 8, background: \"transparent\", border: \"1px solid #f7c1c1\", cursor: \"pointer\", fontSize: 12, color: \"#a32d2d\" }}>\n                Clear test data\n              </button>\n          }\n        </div>\n        {hasTestData && <div style={{ fontSize: 11, color: \"#534AB7\" }}>\n          Week of 1 Jun 2026 loaded \u2014 Oliver excused Thu (ill), Alfie detention Wed. Tap the week row below to expand.\n        </div>}\n      </div>\n\n      {(!state.history || state.history.length === 0)\n        ? <div style={{ textAlign: \"center\", padding: \"3rem 1rem\", color: \"#aaa\", fontSize: 14 }}>No history yet. Log a completed week in the Rewards tab, or load test data above.</div>\n        : [...state.history].reverse().map((h, ri) => {\n            const i = state.history.length - 1 - ri;\n            const oEarned = calcEarnedLocal(h.oliverPts, target, amount, minPts);\n            const aEarned = calcEarnedLocal(h.alfiePts, target, amount, minPts);\n            const isExpanded = expandedIndex === i;\n            const breakdown = isExpanded ? getDayBreakdown(h) : null;\n            const days = breakdown?.days || [];\n            const hasAnyData = breakdown?.hasAnyData ?? false;\n\n            return (\n              <div key={i} style={{ marginBottom: 8, border: \"1px solid #eee\", borderRadius: 14, overflow: \"hidden\", background: \"#fff\" }}>\n                {/* Week header row \u2014 tap to expand */}\n                <div onClick={() => setExpandedIndex(isExpanded ? null : i)}\n                  style={{ display: \"flex\", alignItems: \"center\", gap: 10, padding: \"12px 14px\", cursor: \"pointer\",\n                    background: isExpanded ? \"#fafafa\" : \"#fff\", borderBottom: isExpanded ? \"1px solid #eee\" : \"none\" }}>\n                  <div style={{ flex: 1 }}>\n                    <div style={{ fontWeight: 600, marginBottom: 4, fontSize: 14 }}>\n                      {h.week}\n                      <span style={{ fontSize: 12, color: \"#aaa\", fontWeight: 400, marginLeft: 8 }}>tap to {isExpanded ? \"close\" : \"expand\"}</span>\n                    </div>\n                    <div style={{ display: \"flex\", gap: 8, flexWrap: \"wrap\" }}>\n                      <span style={{ fontSize: 12, background: \"#EEEDFE\", color: \"#3C3489\", padding: \"2px 9px\", borderRadius: 99 }}>\n                        Oliver: {h.oliverPts}pts \u2192 \u00a3{oEarned.toFixed(2)}\n                        {h.oliverPts < minPts && <span style={{ color: \"#A32D2D\" }}> \u26a0\ufe0f</span>}\n                      </span>\n                      <span style={{ fontSize: 12, background: \"#E1F5EE\", color: \"#085041\", padding: \"2px 9px\", borderRadius: 99 }}>\n                        Alfie: {h.alfiePts}pts \u2192 \u00a3{aEarned.toFixed(2)}\n                        {h.alfiePts < minPts && <span style={{ color: \"#A32D2D\" }}> \u26a0\ufe0f</span>}\n                      </span>\n                    </div>\n                  </div>\n                  <div style={{ display: \"flex\", flexDirection: \"column\", alignItems: \"flex-end\", gap: 4 }}>\n                    {h.paid\n                      ? <span style={{ fontSize: 11, background: \"#EAF3DE\", color: \"#27500A\", padding: \"3px 10px\", borderRadius: 99, fontWeight: 600 }}>\u2713 Paid</span>\n                      : <button onClick={e => { e.stopPropagation(); dispatch({ type: \"MARK_PAID\", index: i }); }}\n                          style={{ padding: \"5px 11px\", borderRadius: 8, border: \"1px solid #ddd\", background: \"transparent\", cursor: \"pointer\", fontSize: 12 }}>\n                          \ud83d\udcb7 Mark paid\n                        </button>\n                    }\n                    <button onClick={e => { e.stopPropagation(); dispatch({ type: \"DELETE_HISTORY\", index: i }); }}\n                      style={{ padding: \"3px 8px\", borderRadius: 7, border: \"1px solid #f7c1c1\", background: \"transparent\", cursor: \"pointer\", fontSize: 11, color: \"#a32d2d\" }}>\n                      \ud83d\uddd1 Delete\n                    </button>\n                  </div>\n                  <span style={{ fontSize: 18, color: \"#ccc\", marginLeft: 4 }}>{isExpanded ? \"\u25b2\" : \"\u25bc\"}</span>\n                </div>\n\n                {/* Expanded day-by-day breakdown */}\n                {isExpanded && (\n                  <div style={{ padding: \"12px 14px\" }}>\n                    {/* Kid switcher inside expanded view */}\n                    <div style={{ display: \"flex\", gap: 6, marginBottom: 12 }}>\n                      {[\"oliver\",\"alfie\"].map(id => (\n                        <button key={id} onClick={() => setExpandedKid(id)} style={{\n                          padding: \"5px 14px\", borderRadius: 99, fontSize: 12, fontWeight: 600, cursor: \"pointer\",\n                          border: `2px solid ${expandedKid===id ? KIDS[id].accent : \"transparent\"}`,\n                          background: KIDS[id].light, color: KIDS[id].dark,\n                        }}>{KIDS[id].label}</button>\n                      ))}\n                    </div>\n\n                    {!hasAnyData && (\n                      <div style={{ textAlign: \"center\", padding: \"1rem\", color: \"#aaa\", fontSize: 13, background: \"#fafafa\", borderRadius: 10, marginBottom: 10 }}>\n                        \ud83d\udccb Detailed day-by-day data isn't stored for older weeks \u2014 only available for weeks logged going forward.\n                      </div>\n                    )}\n                    {days.map(({ dk, dayName, oPts, aPts, oExcuse, aExcuse, oPens, aPens, oTicked, aTicked, choreTasks }) => {\n                      const isOliver = expandedKid === \"oliver\";\n                      const excuse = isOliver ? oExcuse : aExcuse;\n                      const pens = isOliver ? oPens : aPens;\n                      const bons = isOliver ? oBonuses : aBonuses;\n                      const rejs = isOliver ? oRejections : aRejections;\n                      const ticked = isOliver ? oTicked : aTicked;\n                      const pts = isOliver ? oPts : aPts;\n                      const penPts = pens.reduce((s,p) => s + (p.pts || PENALTY_TYPES[p.type]?.pts||0), 0);\n                      const bonPts = bons.reduce((s,b) => s + (b.pts||0), 0);\n                      const netDay = excuse ? 13 : Math.max(0, pts - penPts + bonPts);\n                      const k = KIDS[expandedKid];\n\n                      return (\n                        <div key={dk} style={{ marginBottom: 10, padding: \"10px 12px\", background: excuse ? \"#E1F5EE\" : \"#fafafa\", borderRadius: 12, border: `1px solid ${excuse ? \"#9FE1CB\" : \"#f0f0f0\"}` }}>\n                          <div style={{ display: \"flex\", justifyContent: \"space-between\", alignItems: \"center\", marginBottom: 6 }}>\n                            <span style={{ fontSize: 13, fontWeight: 600, color: \"#333\" }}>{dayName}</span>\n                            <span style={{ fontSize: 13, fontWeight: 700, color: excuse ? \"#085041\" : penPts > 0 ? \"#A32D2D\" : k.dark }}>\n                              {excuse ? \"\u2713 Excused (13pts)\" : `${netDay} / 13 pts${penPts > 0 ? ` (\u2212${penPts} penalty)` : \"\"}`}\n                            </span>\n                          </div>\n\n                          {excuse && (\n                            <div style={{ fontSize: 12, color: \"#0F6E56\" }}>\n                              \ud83c\udfe5 {excuse.reason}{excuse.note ? ` \u2014 ${excuse.note}` : \"\"}\n                            </div>\n                          )}\n\n                          {!excuse && pens.length > 0 && (\n                            <div style={{ fontSize: 12, color: \"#A32D2D\", marginBottom: 4 }}>\n                              {pens.map(p => `${p.icon||PENALTY_TYPES[p.type]?.icon||'\u26a0\ufe0f'} ${p.label||PENALTY_TYPES[p.type]?.label||'Penalty'} (\u2212${p.pts||PENALTY_TYPES[p.type]?.pts||3}pts)`).join(\"  \u00b7  \")}\n                            </div>\n                          )}\n                          {!excuse && bons.length > 0 && (\n                            <div style={{ fontSize: 12, color: \"#085041\", marginBottom: 4 }}>\n                              {bons.map(b => `${b.icon||\"\ud83c\udf1f\"} ${b.label} (+${b.pts}pts)`).join(\"  \u00b7  \")}\n                            </div>\n                          )}\n\n                          {!excuse && (\n                            <div style={{ display: \"flex\", flexWrap: \"wrap\", gap: 4, marginTop: 4 }}>\n                              {choreTasks.map(t => {\n                                const done = ticked.some(tc => tc.id === t.id);\n                                const rejReason = !done && rejs[t.id];\n                                return (\n                                  <span key={t.id} title={rejReason ? `Rejected: ${rejReason}` : \"\"} style={{\n                                    fontSize: 11, padding: \"2px 8px\", borderRadius: 99,\n                                    background: done ? k.light : \"#FCEBEB\",\n                                    color: done ? k.dark : \"#A32D2D\",\n                                    fontWeight: 500,\n                                    border: `1px solid ${done ? \"transparent\" : \"#F7C1C1\"}`,\n                                    cursor: rejReason ? \"help\" : \"default\",\n                                  }}>\n                                    {done ? \"\u2713\" : \"\u2717\"} {t.name}{rejReason ? \" \ud83d\udcac\" : \"\"}\n                                  </span>\n                                );\n                              })}\n                            </div>\n                          )}\n                          {!excuse && Object.keys(rejs).length > 0 && (\n                            <div style={{ marginTop: 6 }}>\n                              {choreTasks.filter(t => rejs[t.id]).map(t => (\n                                <div key={t.id} style={{ fontSize: 11, color: \"#791F1F\", background: \"#FCEBEB\",\n                                  border: \"1px solid #F7C1C1\", borderRadius: 8, padding: \"3px 8px\", marginTop: 3 }}>\n                                  \ud83d\udcac {t.name}: {rejs[t.id]}\n                                </div>\n                              ))}\n                            </div>\n                          )}\n                        </div>\n                      );\n                    })}\n                  </div>\n                )}\n              </div>\n            );\n          })\n      }\n    </div>\n  );\n}\n\n\n// \u2500\u2500 Review panel \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction ReviewPanel({ state, dispatch, kid }) {\n  const pending = state.pending || {};\n  const kidPending = pending[kid] || {};\n  const k = KIDS[kid];\n  const [rejectingId, setRejectingId] = useState(null); // \"dk:taskId\" or \"dk:all\"\n  const [rejectReason, setRejectReason] = useState(\"\");\n\n  const pendingDays = Object.entries(kidPending)\n    .filter(([dk, items]) => isInCurrentWeek(dk) && Object.values(items).some(Boolean))\n    .sort(([a],[b]) => a.localeCompare(b));\n\n  if (pendingDays.length === 0) return (\n    <div style={{ background: \"#f9fafb\", border: \"1px solid #eee\", borderRadius: 12, padding: \"12px 16px\", marginBottom: 12, fontSize: 13, color: \"#aaa\", textAlign: \"center\" }}>\n      \u2713 No pending approvals for {k.label}\n    </div>\n  );\n\n  const dayLabel = (dk) => {\n    const [y,m,d] = dk.split(\"-\").map(Number);\n    return new Date(y,m-1,d).toLocaleDateString(\"en-GB\", { weekday: \"long\", day: \"numeric\", month: \"short\" });\n  };\n\n  const startReject = (key) => { setRejectingId(key); setRejectReason(\"\"); };\n  const cancelReject = () => { setRejectingId(null); setRejectReason(\"\"); };\n\n  const confirmReject = (dk, taskId) => {\n    if (taskId === \"all\") {\n      dispatch({ type: \"REJECT_ALL_DAY\", kid, dk, reason: rejectReason });\n    } else {\n      dispatch({ type: \"REJECT_TASK\", kid, dk, taskId, reason: rejectReason });\n    }\n    setRejectingId(null); setRejectReason(\"\");\n  };\n\n  return (\n    <div style={{ marginBottom: 12 }}>\n      {pendingDays.map(([dk, items]) => {\n        const pendingTasks = getTasksForDate(state, dk, kid).filter(t => !t.schedule && items[t.id]);\n        if (!pendingTasks.length) return null;\n        const rejectAllKey = `${dk}:all`;\n        return (\n          <div key={dk} style={{ background: \"#FFFBEA\", border: \"1px solid #FAC775\", borderRadius: 12, padding: \"12px 14px\", marginBottom: 10 }}>\n            <div style={{ display: \"flex\", alignItems: \"center\", justifyContent: \"space-between\", marginBottom: 10 }}>\n              <span style={{ fontSize: 13, fontWeight: 600, color: \"#633806\" }}>{dayLabel(dk)}</span>\n              <div style={{ display: \"flex\", gap: 6 }}>\n                <button onClick={() => dispatch({ type: \"APPROVE_ALL_DAY\", kid, dk })}\n                  style={{ padding: \"5px 12px\", borderRadius: 8, background: k.accent, color: \"#fff\", border: \"none\", cursor: \"pointer\", fontSize: 12, fontWeight: 600 }}>\n                  \u2713 Approve all\n                </button>\n                <button onClick={() => startReject(rejectAllKey)}\n                  style={{ padding: \"5px 12px\", borderRadius: 8, background: \"transparent\", border: \"1px solid #F7C1C1\", cursor: \"pointer\", fontSize: 12, color: \"#A32D2D\" }}>\n                  \u2717 Reject all\n                </button>\n              </div>\n            </div>\n\n            {/* Reject all reason box */}\n            {rejectingId === rejectAllKey && (\n              <div style={{ background: \"#FCEBEB\", border: \"1px solid #F7C1C1\", borderRadius: 10, padding: \"10px 12px\", marginBottom: 8 }}>\n                <div style={{ fontSize: 12, color: \"#A32D2D\", fontWeight: 600, marginBottom: 6 }}>Reason for rejecting all? (optional)</div>\n                <input value={rejectReason} onChange={e => setRejectReason(e.target.value)}\n                  placeholder=\"e.g. Room still not tidy, didn't see this done...\"\n                  style={{ width: \"100%\", padding: \"7px 10px\", borderRadius: 8, border: \"1px solid #F7C1C1\", fontSize: 13, marginBottom: 8 }}\n                  autoFocus />\n                <div style={{ display: \"flex\", gap: 6 }}>\n                  <button onClick={() => confirmReject(dk, \"all\")}\n                    style={{ padding: \"6px 14px\", borderRadius: 8, background: \"#A32D2D\", color: \"#fff\", border: \"none\", cursor: \"pointer\", fontSize: 12, fontWeight: 600 }}>\n                    Confirm reject all\n                  </button>\n                  <button onClick={cancelReject}\n                    style={{ padding: \"6px 12px\", borderRadius: 8, background: \"transparent\", border: \"1px solid #ddd\", cursor: \"pointer\", fontSize: 12 }}>\n                    Cancel\n                  </button>\n                </div>\n              </div>\n            )}\n\n            {pendingTasks.map(t => {\n              const rejectKey = `${dk}:${t.id}`;\n              return (\n                <div key={t.id} style={{ marginBottom: 6 }}>\n                  <div style={{ display: \"flex\", alignItems: \"center\", gap: 8, padding: \"7px 10px\",\n                    background: \"#fff\", border: \"1px solid #FAC775\", borderRadius: 10 }}>\n                    <span style={{ fontSize: 13, flex: 1 }}>{t.name}</span>\n                    <button onClick={() => dispatch({ type: \"APPROVE_TASK\", kid, dk, taskId: t.id })}\n                      style={{ padding: \"4px 10px\", borderRadius: 7, background: k.light, border: `1px solid ${k.accent}`, cursor: \"pointer\", fontSize: 12, color: k.dark, fontWeight: 600 }}>\n                      \u2713\n                    </button>\n                    <button onClick={() => rejectingId === rejectKey ? cancelReject() : startReject(rejectKey)}\n                      style={{ padding: \"4px 10px\", borderRadius: 7, background: \"#FCEBEB\", border: \"1px solid #F7C1C1\", cursor: \"pointer\", fontSize: 12, color: \"#A32D2D\", fontWeight: 600 }}>\n                      \u2717\n                    </button>\n                  </div>\n                  {/* Per-task reject reason box */}\n                  {rejectingId === rejectKey && (\n                    <div style={{ background: \"#FCEBEB\", border: \"1px solid #F7C1C1\", borderRadius: \"0 0 10px 10px\", padding: \"8px 10px\", marginTop: -4 }}>\n                      <input value={rejectReason} onChange={e => setRejectReason(e.target.value)}\n                        placeholder=\"Reason (optional) \u2014 e.g. still messy, didn't see it done\"\n                        style={{ width: \"100%\", padding: \"6px 10px\", borderRadius: 8, border: \"1px solid #F7C1C1\", fontSize: 12, marginBottom: 6 }}\n                        autoFocus />\n                      <div style={{ display: \"flex\", gap: 6 }}>\n                        <button onClick={() => confirmReject(dk, t.id)}\n                          style={{ padding: \"5px 12px\", borderRadius: 7, background: \"#A32D2D\", color: \"#fff\", border: \"none\", cursor: \"pointer\", fontSize: 12, fontWeight: 600 }}>\n                          Confirm\n                        </button>\n                        <button onClick={cancelReject}\n                          style={{ padding: \"5px 10px\", borderRadius: 7, background: \"transparent\", border: \"1px solid #ddd\", cursor: \"pointer\", fontSize: 12 }}>\n                          Cancel\n                        </button>\n                      </div>\n                    </div>\n                  )}\n                </div>\n              );\n            })}\n          </div>\n        );\n      })}\n    </div>\n  );\n}\n\n\nfunction ParentChoreItem({ t, k, kid, viewDate, dayChecks, pending, onToggle }) {\n  const isApproved = !!(dayChecks[t.id]);\n  const isPend = !isApproved && !!((pending[kid] || {})[viewDate]?.[t.id]);\n  return (\n    <div onClick={onToggle} style={{ display: \"flex\", alignItems: \"center\", gap: 12, padding: \"11px 14px\", marginBottom: 5,\n      background: isApproved ? k.light : isPend ? \"#FFFBEA\" : \"#fff\",\n      border: `1px solid ${isApproved ? k.accent : isPend ? \"#FAC775\" : \"#e8e8e8\"}`,\n      borderRadius: 11, cursor: \"pointer\" }}>\n      <div style={{ width: 22, height: 22, borderRadius: \"50%\", flexShrink: 0, display: \"flex\", alignItems: \"center\", justifyContent: \"center\",\n        background: isApproved ? k.accent : isPend ? \"#FAC775\" : \"transparent\",\n        border: `2px solid ${isApproved ? k.accent : isPend ? \"#FAC775\" : \"#ccc\"}` }}>\n        {isApproved && <span style={{ color: \"#fff\", fontSize: 12 }}>\u2713</span>}\n        {isPend && <span style={{ fontSize: 11 }}>\u23f3</span>}\n      </div>\n      <span style={{ flex: 1, fontSize: 14 }}>{t.name}</span>\n      <span style={{ fontSize: 11, padding: \"2px 8px\", borderRadius: 99,\n        color: isApproved ? k.mid : isPend ? \"#BA7517\" : \"#999\",\n        background: isApproved ? k.light : isPend ? \"#FAEEDA\" : \"#f5f5f5\" }}>\n        {isApproved ? \"\u2713 approved\" : isPend ? \"\u23f3 pending\" : \"1pt\"}\n      </span>\n    </div>\n  );\n}\n\n\n// \u2500\u2500 Friday chores tab \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction FridayChoresTab({ state, dispatch }) {\n  const [kid, setKid] = useState(\"oliver\");\n  const [viewDate, setViewDate] = useState(() => {\n    // Default to most recent Friday or next Friday\n    const d = new Date();\n    const day = d.getDay();\n    const diff = day === 5 ? 0 : day === 6 ? -1 : -(day + 2);\n    const fri = new Date(d); fri.setDate(d.getDate() + (day === 5 ? 0 : (5 - day + 7) % 7 === 0 ? 0 : day < 5 ? 5 - day : 5 - day + 7));\n    // If today is Friday use today, else use last Friday\n    if (day === 5) return todayKey();\n    const lastFri = new Date(d); lastFri.setDate(d.getDate() - ((day + 1) % 7 + 1));\n    return dateKeyFromDate(lastFri);\n  });\n\n  const k = KIDS[kid];\n  const checks = state.checks[kid] || {};\n  const dayChecks = checks[viewDate] || {};\n  const excuses = state.excuses || {};\n  const penalties = state.penalties || {};\n  const bonuses = state.bonuses || {};\n  const pending = state.pending || {};\n  const wkPts = netPts(checks, excuses, penalties, kid, bonuses, pending);\n  const { target: baseTarget, amount, minPts: baseMin = 45 } = state.rewards;\n  const adjTarget = getAdjustedTarget(baseTarget, excuses, kid);\n  const target = adjTarget;\n  const fridayTasks = getTasksForDate(state, viewDate || todayKey(), kid);\n  const pendingCount = getPendingDayCount(pending, kid);\n  const btn = (extra={}) => ({ padding: \"7px 13px\", borderRadius: 8, border: \"1px solid #ddd\", background: \"transparent\", cursor: \"pointer\", fontSize: 13, ...extra });\n\n  const goBack = () => {\n    const [y,m,d] = viewDate.split(\"-\").map(Number);\n    const prev = new Date(y,m-1,d);\n    // Go back to previous Friday\n    prev.setDate(prev.getDate() - 7);\n    setViewDate(dateKeyFromDate(prev));\n  };\n  const goForward = () => {\n    const [y,m,d] = viewDate.split(\"-\").map(Number);\n    const next = new Date(y,m-1,d);\n    next.setDate(next.getDate() + 7);\n    const nk = dateKeyFromDate(next);\n    if (nk <= todayKey()) setViewDate(nk);\n  };\n  const isCurrentFriday = viewDate === (() => {\n    const d = new Date();\n    if (d.getDay() === 5) return todayKey();\n    return null;\n  })();\n  const isToday = viewDate === todayKey();\n  const readOnly = !isToday;\n\n  return (\n    <div>\n      <div style={{ display: \"flex\", gap: 8, marginBottom: 12 }}>\n        {[\"oliver\",\"alfie\"].map(id => (\n          <button key={id} onClick={() => setKid(id)} style={{\n            flex: 1, padding: 10, borderRadius: 10, border: `2px solid ${kid===id ? KIDS[id].accent : \"transparent\"}`,\n            background: KIDS[id].light, color: KIDS[id].dark, fontWeight: 600, fontSize: 14, cursor: \"pointer\",\n          }}>{KIDS[id].label}</button>\n        ))}\n      </div>\n\n      {/* Friday date navigator \u2014 jumps by week */}\n      <div style={{ display: \"flex\", alignItems: \"center\", justifyContent: \"space-between\", marginBottom: 12, background: k.light, borderRadius: 12, padding: \"8px 12px\" }}>\n        <button onClick={goBack} style={{ width: 32, height: 32, borderRadius: \"50%\", border: \"none\", background: \"transparent\", cursor: \"pointer\", fontSize: 20, color: k.mid }}>\u2039</button>\n        <div style={{ textAlign: \"center\" }}>\n          <div style={{ fontSize: 13, fontWeight: 700, color: k.dark }}>{friendlyDate(viewDate)}</div>\n          {readOnly && <div style={{ fontSize: 11, color: k.mid }}>Viewing past Friday</div>}\n        </div>\n        <button onClick={goForward} style={{ width: 32, height: 32, borderRadius: \"50%\", border: \"none\", background: \"transparent\", cursor: isToday ? \"default\" : \"pointer\", fontSize: 20, color: isToday ? \"#ccc\" : k.mid }}>\u203a</button>\n      </div>\n\n      {pendingCount > 0 && isToday && (\n        <div style={{ marginBottom: 12 }}>\n          <div style={{ fontSize: 12, fontWeight: 600, color: \"#BA7517\", textTransform: \"uppercase\", letterSpacing: \"0.06em\", marginBottom: 8 }}>\u23f3 Pending review</div>\n          <ReviewPanel state={state} dispatch={dispatch} kid={kid} />\n        </div>\n      )}\n\n      <div style={{ background: \"#FAEEDA\", border: \"1px solid #FAC775\", borderRadius: 10, padding: \"8px 12px\", fontSize: 12, color: \"#633806\", marginBottom: 12 }}>\n        \u26a1 Parent view \u2014 time locks bypassed\n      </div>\n\n      {[\"Morning\",\"Afternoon\",\"Evening\"].map(sec => {\n        const tasks = fridayTasks.filter(t => t.section === sec);\n        if (!tasks.length) return null;\n        return (\n          <div key={sec}>\n            <div style={{ fontSize: 11, fontWeight: 600, color: \"#888\", textTransform: \"uppercase\", letterSpacing: \"0.07em\", marginBottom: 5, marginTop: 10 }}>{sec}</div>\n            {tasks.map(t => {\n              if (t.schedule) return <ScheduleItem key={t.id} task={t} big={false} isGrounded={t.canGround && !!(state.grounded||{})[kid]} onToggleGround={t.canGround ? () => dispatch({ type: \"SET_GROUNDED\", kid, value: !(state.grounded||{})[kid] }) : undefined} />;\n              const isApproved = !!dayChecks[t.id];\n              const isPend = !isApproved && !!((pending[kid]||{})[viewDate]?.[t.id]);\n              return (\n                <ParentChoreItem key={t.id} t={t} k={k} kid={kid} viewDate={viewDate}\n                  dayChecks={dayChecks} pending={pending}\n                  onToggle={() => isToday && dispatch({ type: \"TOGGLE\", kid, taskId: t.id })} />\n              );\n            })}\n          </div>\n        );\n      })}\n    </div>\n  );\n}\n\n// \u2500\u2500 Progress tab \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction ProgressTab({ state }) {\n  // Build this week's Mon-Fri date keys\n  const now = new Date();\n  const day = now.getDay() || 7;\n  const monday = new Date(now); monday.setDate(now.getDate() - (day - 1)); monday.setHours(0,0,0,0);\n  const weekDays = Array.from({ length: 5 }, (_, i) => {\n    const d = new Date(monday); d.setDate(monday.getDate() + i);\n    return { dk: dateKeyFromDate(d), label: d.toLocaleDateString(\"en-GB\", { weekday: \"short\", day: \"numeric\", month: \"short\" }), isFri: d.getDay() === 5 };\n  });\n  const todayDk = todayKey();\n\n  return (\n    <div>\n      {[\"oliver\",\"alfie\"].map(kid => {\n        const k = KIDS[kid];\n        const checks = state.checks[kid] || {};\n        const excuses = state.excuses || {};\n        const penalties = state.penalties || {};\n        const bonuses = state.bonuses || {};\n        const pending = state.pending || {};\n        const wkPts = netPts(checks, excuses, penalties, kid, bonuses, pending);\n        const approvedPts = netApprovedPts(checks, excuses, penalties, kid, bonuses);\n        const pendingPts = getPendingWeekPts(pending, kid, excuses);\n        const { target: baseTarget, amount, minPts: baseMin = 45 } = state.rewards;\n        const adjTarget = getAdjustedTarget(baseTarget, excuses, kid);\n        const adjMin = getAdjustedMin(baseMin, excuses, kid);\n        const earned = calcEarned(wkPts, adjTarget, amount, adjMin);\n        const approvedEarned = calcEarned(approvedPts, adjTarget, amount, adjMin);\n        const penPts = getWeekPenalties(penalties, kid, excuses);\n        const bonPts = getWeekBonuses(bonuses, kid, excuses);\n        const aboveTarget = wkPts > adjTarget;\n        const appPct = adjTarget > 0 ? Math.min(100, Math.round(approvedPts / adjTarget * 100)) : 100;\n        const pendPct = adjTarget > 0 ? Math.min(100 - appPct, Math.round(pendingPts / adjTarget * 100)) : 0;\n        const CHORES = 13;\n\n        return (\n          <div key={kid} style={{ background: \"#fff\", border: `2px solid ${k.accent}`, borderRadius: 16, padding: 16, marginBottom: 16 }}>\n            {/* \u2500\u2500 Weekly header \u2500\u2500 */}\n            <div style={{ display: \"flex\", justifyContent: \"space-between\", alignItems: \"flex-start\", marginBottom: 10 }}>\n              <div>\n                <div style={{ fontSize: 16, fontWeight: 700, color: k.dark, marginBottom: 2 }}>{k.label}</div>\n                <div style={{ fontSize: 12, color: \"#888\" }}>{wkPts} / {adjTarget} pts this week</div>\n              </div>\n              <div style={{ textAlign: \"right\" }}>\n                <div style={{ fontSize: 26, fontWeight: 700, color: aboveTarget ? \"#BA7517\" : earned > 0 ? k.dark : \"#aaa\" }}>\n                  \u00a3{earned.toFixed(2)}\n                </div>\n                <div style={{ fontSize: 11, color: \"#aaa\" }}>\n                  {aboveTarget ? `\u00a3${amount.toFixed(2)} + bonus` : wkPts < adjMin ? \"below minimum\" : `of \u00a3${amount.toFixed(2)}`}\n                </div>\n              </div>\n            </div>\n\n            {/* \u2500\u2500 Progress bar \u2500\u2500 */}\n            <div style={{ height: 10, borderRadius: 99, background: \"#eee\", overflow: \"hidden\", marginBottom: 4, position: \"relative\" }}>\n              <div style={{ position: \"absolute\", left: 0, top: 0, height: \"100%\", borderRadius: \"99px 0 0 99px\",\n                width: `${appPct}%`, background: APPROVED.icon, transition: \"width 0.4s\" }} />\n              <div style={{ position: \"absolute\", left: `${appPct}%`, top: 0, height: \"100%\",\n                borderRadius: appPct===0 ? 99 : \"0 99px 99px 0\",\n                width: `${pendPct}%`, background: \"#FAC775\", opacity: 0.8 }} />\n            </div>\n            <div style={{ display: \"flex\", justifyContent: \"space-between\", fontSize: 11, color: \"#aaa\", marginBottom: 8 }}>\n              <span>{approvedPts} approved{pendingPts > 0 ? ` \u00b7 ${pendingPts} pending` : \"\"}</span>\n              <span>{adjTarget} pts = \u00a3{amount.toFixed(2)}</span>\n            </div>\n\n            {/* \u2500\u2500 Bonus/penalty summary \u2500\u2500 */}\n            {(penPts > 0 || bonPts > 0) && (\n              <div style={{ display: \"flex\", gap: 10, fontSize: 12, marginBottom: 10 }}>\n                {penPts > 0 && <span style={{ color: \"#A32D2D\", background: \"#FCEBEB\", padding: \"2px 8px\", borderRadius: 99 }}>\u26a0\ufe0f \u2212{penPts} penalty pts</span>}\n                {bonPts > 0 && <span style={{ color: \"#085041\", background: \"#E1F5EE\", padding: \"2px 8px\", borderRadius: 99 }}>\ud83c\udf1f +{bonPts} bonus pts</span>}\n              </div>\n            )}\n\n            {/* \u2500\u2500 Daily breakdown \u2500\u2500 */}\n            <div style={{ borderTop: \"1px solid #f0f0f0\", paddingTop: 10 }}>\n              <div style={{ fontSize: 11, fontWeight: 600, color: \"#888\", textTransform: \"uppercase\", letterSpacing: \"0.06em\", marginBottom: 8 }}>Daily breakdown</div>\n              {weekDays.map(({ dk, label, isFri }) => {\n                const isFuture = dk > todayDk;\n                const excuse = (excuses[kid] || {})[dk];\n                const dayChecks = checks[dk] || {};\n                const dayPending = (pending[kid] || {})[dk] || {};\n                const dayPens = (penalties[kid] || {})[dk] || [];\n                const dayBons = (bonuses[kid] || {})[dk] || [];\n                const approvedCount = Object.values(dayChecks).filter(Boolean).length;\n                const pendingCount = Object.values(dayPending).filter(Boolean).length;\n                const dayPenPts = dayPens.reduce((s,p) => s + (p.pts || PENALTY_TYPES[p.type]?.pts || 0), 0);\n                const dayBonPts = dayBons.reduce((s,b) => s + (b.pts || 0), 0);\n                const netDay = excuse ? CHORES_PER_DAY : Math.max(0, approvedCount + pendingCount - dayPenPts + dayBonPts);\n                const dayEarned = calcEarned(netDay, CHORES, amount / 5, 0); // daily share\n                const taskList = getTasksForDate(state, dk, kid);\n                const choreCount = taskList.filter(t => !t.schedule).length;\n\n                let statusColor = \"#aaa\";\n                let statusBg = \"#f5f5f5\";\n                let statusLabel = isFuture ? \"upcoming\" : \"0 pts\";\n                if (excuse) { statusColor = \"#085041\"; statusBg = \"#E1F5EE\"; statusLabel = `\ud83c\udfe5 ${excuse.reason}`; }\n                else if (isFuture) { statusColor = \"#aaa\"; statusBg = \"#f5f5f5\"; statusLabel = \"upcoming\"; }\n                else if (approvedCount + pendingCount === 0) { statusColor = \"#aaa\"; statusBg = \"#f5f5f5\"; statusLabel = \"nothing ticked\"; }\n                else if (pendingCount > 0 && approvedCount === 0) { statusColor = \"#BA7517\"; statusBg = \"#FAEEDA\"; statusLabel = `\u23f3 ${pendingCount} pending`; }\n                else if (pendingCount > 0) { statusColor = \"#BA7517\"; statusBg = \"#FAEEDA\"; statusLabel = `\u2713${approvedCount} + \u23f3${pendingCount}`; }\n                else { statusColor = k.mid; statusBg = k.light; statusLabel = `\u2713 ${approvedCount}/${choreCount}`; }\n\n                return (\n                  <div key={dk} style={{ display: \"flex\", alignItems: \"center\", gap: 10, padding: \"7px 0\", borderBottom: \"1px solid #f8f8f8\" }}>\n                    <div style={{ width: 90, flexShrink: 0 }}>\n                      <div style={{ fontSize: 12, fontWeight: 600, color: isFuture ? \"#ccc\" : \"#333\" }}>{label}</div>\n                      {isFri && <div style={{ fontSize: 10, color: \"#BA7517\" }}>Friday list</div>}\n                    </div>\n                    <div style={{ flex: 1 }}>\n                      <div style={{ height: 6, borderRadius: 99, background: \"#eee\", overflow: \"hidden\" }}>\n                        <div style={{ height: \"100%\", borderRadius: 99, background: excuse ? \"#1D9E75\" : approvedCount > 0 ? k.accent : \"#FAC775\",\n                          width: excuse ? \"100%\" : `${Math.min(100, Math.round((approvedCount + pendingCount) / choreCount * 100))}%`,\n                          opacity: isFuture ? 0.2 : 1 }} />\n                      </div>\n                    </div>\n                    <span style={{ fontSize: 11, padding: \"2px 8px\", borderRadius: 99, background: statusBg, color: statusColor, whiteSpace: \"nowrap\", minWidth: 80, textAlign: \"center\" }}>\n                      {statusLabel}\n                    </span>\n                    <span style={{ fontSize: 12, fontWeight: 600, color: isFuture ? \"#ccc\" : excuse ? \"#085041\" : netDay > 0 ? k.dark : \"#aaa\", minWidth: 36, textAlign: \"right\" }}>\n                      {isFuture ? \"\u2014\" : `${netDay}pt`}\n                    </span>\n                  </div>\n                );\n              })}\n            </div>\n          </div>\n        );\n      })}\n    </div>\n  );\n}\n\n// \u2500\u2500 Tasks tab (weekday + friday) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction TasksTab({ state, dispatch, undo, canUndo }) {\n  const [listTab, setListTab] = useState(\"weekday\");\n  const [schedKid, setSchedKid] = useState(\"oliver\");\n  const [newName, setNewName] = useState(\"\");\n  const [newSec, setNewSec] = useState(\"Morning\");\n  const [newType, setNewType] = useState(\"chore\");\n  const [editId, setEditId] = useState(null);\n  const [editName, setEditName] = useState(\"\");\n  const [editSec, setEditSec] = useState(\"\");\n  const [editType, setEditType] = useState(\"chore\");\n  const [editCanGround, setEditCanGround] = useState(false);\n  const [newCanGround, setNewCanGround] = useState(false);\n  const [dragOver, setDragOver] = useState(null);\n  const dragIdx = useRef(null);\n  const [selected, setSelected] = useState(new Set());\n  const [selectMode, setSelectMode] = useState(false);\n\n  useEffect(() => { setSelected(new Set()); setSelectMode(false); }, [listTab, schedKid]);\n  const isFri = listTab === \"friday\";\n  const rawTasks = isFri ? state.fridayTasks : state.tasks;\n  const tasks = rawTasks?.[schedKid] || (isFri ? DEFAULT_FRIDAY_TASKS : DEFAULT_TASKS);\n  const inp = { padding: \"8px 10px\", borderRadius: 8, border: \"1px solid #ddd\", fontSize: 13, width: \"100%\", marginBottom: 8 };\n  const btn = (extra={}
