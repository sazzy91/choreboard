<script>
const STORAGE_URL = "/.netlify/functions/storage";
window._binCache = null;
window._lastFetch = 0;
const MIN_FETCH_INTERVAL = 25000;
async function fetchBin() {
  const now = Date.now();
  if (window._binCache && (now - window._lastFetch) < MIN_FETCH_INTERVAL) return window._binCache;
  const r = await fetch(STORAGE_URL);
  if (!r.ok) throw new Error("read failed: " + r.status);
  const bin = await r.json();
  window._binCache = bin; window._lastFetch = now;
  return bin;
}
window.storage = {
  async get(key, shared) {
    try { const bin = await fetchBin(); const val = bin[key]; return val !== undefined ? { key, value: JSON.stringify(val) } : null; }
    catch(e) { console.error("storage.get:", e); return null; }
  },
  async set(key, value, shared) {
    try {
      let bin = window._binCache || {};
      bin[key] = JSON.parse(value); window._binCache = bin; window._lastFetch = Date.now();
      const w = await fetch(STORAGE_URL, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(bin) });
      if (!w.ok) { console.error("write failed:", w.status); return null; }
      console.log("Saved ✓"); return { key, value };
    } catch(e) { console.error("storage.set:", e); return null; }
  }
};
</script>

d: \"transparent\", cursor: addDate===todayKey()?\"default\":\"pointer\", fontSize: 16, color: addDate===todayKey()?\"#ccc\":\"#333\" }}>\u203a</button>\n          </div>\n        </div>\n        <div style={{ display: \"flex\", gap: 8, marginBottom: 8 }}>\n          {Object.entries(PENALTY_TYPES).map(([type, info]) => (\n            <button key={type} onClick={() => addPenalty(type)} style={{\n              flex: 1, padding: \"10px 8px\", borderRadius: 10, border: saved===type ? \"2px solid #E24B4A\" : \"1.5px solid #F7C1C1\",\n              background: saved===type ? \"#FCEBEB\" : \"#FFF5F5\", cursor: \"pointer\", fontSize: 13, fontWeight: 600, color: \"#A32D2D\",\n            }}>{info.icon} {info.label}<br /><span style={{ fontSize: 11, fontWeight: 400 }}>\u2212{info.pts} pts</span></button>\n          ))}\n        </div>\n        <div style={{ background: \"#fff8f8\", borderRadius: 10, padding: \"10px 12px\", border: \"1px solid #F7C1C1\" }}>\n          <div style={{ fontSize: 12, color: \"#A32D2D\", marginBottom: 8, fontWeight: 500 }}>Custom penalty</div>\n          <div style={{ display: \"flex\", gap: 8, marginBottom: 8 }}>\n            <div style={{ width: 80 }}>\n              <label style={{ fontSize: 11, color: \"#888\", display: \"block\", marginBottom: 3 }}>Points</label>\n              <input type=\"number\" value={customPts} min={1} max={13} onChange={e => setCustomPts(e.target.value)}\n                style={{ width: \"100%\", padding: \"7px 8px\", borderRadius: 8, border: \"1px solid #ddd\", fontSize: 13 }} />\n            </div>\n            <div style={{ flex: 1 }}>\n              <label style={{ fontSize: 11, color: \"#888\", display: \"block\", marginBottom: 3 }}>Reason</label>\n              <input value={customReason} onChange={e => setCustomReason(e.target.value)} placeholder=\"e.g. Rude to sibling...\"\n                style={{ width: \"100%\", padding: \"7px 10px\", borderRadius: 8, border: \"1px solid #ddd\", fontSize: 13 }} />\n            </div>\n          </div>\n          <button onClick={addCustom} style={{ padding: \"7px 14px\", borderRadius: 8, background: \"#A32D2D\", color: \"#fff\", border: \"none\", cursor: \"pointer\", fontSize: 13, fontWeight: 600 }}>\u2212 Apply</button>\n        </div>\n        {saved && <div style={{ fontSize: 12, color: \"#A32D2D\", marginTop: 8 }}>\u2713 Applied!</div>}\n      </>}\n    </div>\n  );\n}\n\n// \u2500\u2500 Bonus manager \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction BonusManager({ state, dispatch, defaultKid }) {\n  const [kid, setKid] = useState(defaultKid || \"oliver\");\n  useEffect(() => { if (defaultKid) setKid(defaultKid); }, [defaultKid]);\n  const [weekOffset, setWeekOffset] = useState(0);\n  const [addDate, setAddDate] = useState(todayKey());\n  const [showAdd, setShowAdd] = useState(false);\n  const [saved, setSaved] = useState(null);\n  const [customPts, setCustomPts] = useState(3);\n  const [customReason, setCustomReason] = useState(\"\");\n\n  const k = KIDS[kid];\n  const viewSat = (() => { const s = getWeekStartSat(); s.setDate(s.getDate() + weekOffset * 7); return s; })();\n  const viewSatDk = dateKeyFromDate(viewSat);\n  const viewFriDk = (() => { const d = new Date(viewSat); d.setDate(viewSat.getDate() + 6); return dateKeyFromDate(d); })();\n  const weekLabel = viewSat.toLocaleDateString(\"en-GB\", { day: \"numeric\", month: \"short\" }) + \" \u2013 \" +\n    new Date(viewSat.getFullYear(), viewSat.getMonth(), viewSat.getDate() + 6).toLocaleDateString(\"en-GB\", { day: \"numeric\", month: \"short\" });\n\n  const bonuses = state.bonuses || {};\n  const kidBons = bonuses[kid] || {};\n  const weekBons = Object.entries(kidBons)\n    .filter(([dk]) => dk >= viewSatDk && dk <= viewFriDk)\n    .sort(([a],[b]) => a.localeCompare(b));\n  const totalPts = weekBons.reduce((s,[,list]) => s + list.reduce((ss,b) => ss + (b.pts||0), 0), 0);\n\n  const dayLabel = (dk) => {\n    const [y,m,d] = dk.split(\"-\").map(Number);\n    return new Date(y,m-1,d).toLocaleDateString(\"en-GB\", { weekday: \"short\", day: \"numeric\", month: \"short\" });\n  };\n\n  const addBonus = (type, pts, label, icon) => {\n    dispatch({ type: \"ADD_BONUS\", kid, dateKey: addDate, bonusType: type, pts, label, icon });\n    setSaved(label); setTimeout(() => setSaved(null), 1500);\n  };\n  const addCustom = () => {\n    if (!customReason.trim()) return;\n    dispatch({ type: \"ADD_BONUS\", kid, dateKey: addDate, bonusType: \"custom\", pts: Number(customPts), label: customReason.trim(), icon: \"\ud83c\udf1f\" });\n    setSaved(\"custom\"); setCustomReason(\"\"); setTimeout(() => setSaved(null), 1500);\n  };\n\n  return (\n    <div style={{ background: \"#fff\", border: \"1px solid #eee\", borderRadius: 14, padding: 16, marginBottom: 12 }}>\n      <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 12 }}>Award bonus</div>\n\n      {/* Kid switcher */}\n      <div style={{ display: \"flex\", gap: 8, marginBottom: 12 }}>\n        {[\"oliver\",\"alfie\"].map(id => (\n          <button key={id} onClick={() => setKid(id)} style={{\n            flex: 1, padding: \"8px\", borderRadius: 10, border: `2px solid ${kid===id ? KIDS[id].accent : \"transparent\"}`,\n            background: KIDS[id].light, color: KIDS[id].dark, fontWeight: 600, fontSize: 13, cursor: \"pointer\",\n          }}>{KIDS[id].label}</button>\n        ))}\n      </div>\n\n      {/* Week navigator */}\n      <div style={{ display: \"flex\", alignItems: \"center\", justifyContent: \"space-between\", background: \"#f5f5f5\", borderRadius: 10, padding: \"6px 10px\", marginBottom: 12 }}>\n        <button onClick={() => setWeekOffset(o => o-1)} style={{ width: 28, height: 28, borderRadius: \"50%\", border: \"none\", background: \"transparent\", cursor: \"pointer\", fontSize: 18 }}>\u2039</button>\n        <span style={{ fontSize: 12, fontWeight: 600, color: \"#555\" }}>{weekLabel}{weekOffset === 0 ? \" (this week)\" : \"\"}</span>\n        <button onClick={() => setWeekOffset(o => Math.min(0, o+1))} style={{ width: 28, height: 28, borderRadius: \"50%\", border: \"none\", background: \"transparent\", cursor: weekOffset===0 ? \"default\" : \"pointer\", fontSize: 18, color: weekOffset===0 ? \"#ccc\" : \"#333\" }}>\u203a</button>\n      </div>\n\n      {/* This week's bonuses */}\n      {weekBons.length === 0 ? (\n        <div style={{ fontSize: 12, color: \"#aaa\", marginBottom: 12, textAlign: \"center\", padding: \"8px\" }}>No bonuses this week</div>\n      ) : (\n        <div style={{ marginBottom: 12 }}>\n          <div style={{ fontSize: 11, color: \"#085041\", fontWeight: 600, marginBottom: 6 }}>\n            +{totalPts}pts awarded this week\n          </div>\n          {weekBons.map(([dk, list]) => (\n            <div key={dk} style={{ marginBottom: 8 }}>\n              <div style={{ fontSize: 11, color: \"#888\", marginBottom: 4 }}>{dayLabel(dk)}</div>\n              {list.map(b => (\n                <div key={b.id} style={{ display: \"flex\", alignItems: \"center\", gap: 8, padding: \"7px 10px\",\n                  background: \"#E1F5EE\", border: \"1px solid #9FE1CB\", borderRadius: 10, marginBottom: 4, fontSize: 13 }}>\n                  <span>{b.icon||\"\ud83c\udf1f\"}</span>\n                  <span style={{ flex: 1, color: \"#085041\" }}>{b.label}</span>\n                  <span style={{ fontWeight: 700, color: \"#085041\" }}>+{b.pts}pts</span>\n                  <button onClick={() => dispatch({ type: \"REMOVE_BONUS\", kid, dateKey: dk, id: b.id })}\n                    style={{ padding: \"3px 8px\", borderRadius: 6, border: \"1px solid #9FE1CB\", background: \"transparent\", cursor: \"pointer\", fontSize: 12, color: \"#085041\" }}>\u2715</button>\n                </div>\n              ))}\n            </div>\n          ))}\n        </div>\n      )}\n\n      {/* Add new bonus */}\n      <button onClick={() => setShowAdd(s => !s)} style={{\n        width: \"100%\", padding: \"8px\", borderRadius: 8, border: `1.5px solid ${showAdd ? k.accent : k.accent+\"80\"}`,\n        background: showAdd ? k.light : \"#fff\", cursor: \"pointer\", fontSize: 13, color: k.dark, fontWeight: 600, marginBottom: showAdd ? 10 : 0\n      }}>{showAdd ? \"\u2715 Cancel\" : \"+ Add bonus\"}</button>\n\n      {showAdd && <>\n        <div style={{ marginBottom: 10 }}>\n          <label style={{ fontSize: 12, color: \"#888\", display: \"block\", marginBottom: 4 }}>Date</label>\n          <div style={{ display: \"flex\", alignItems: \"center\", gap: 6 }}>\n            <button onClick={() => { const [y,m,d] = addDate.split(\"-\").map(Number); const p = new Date(y,m-1,d); p.setDate(p.getDate()-1); setAddDate(dateKeyFromDate(p)); }}\n              style={{ width: 30, height: 30, borderRadius: \"50%\", border: \"1px solid #ddd\", background: \"transparent\", cursor: \"pointer\", fontSize: 16 }}>\u2039</button>\n            <input type=\"date\" value={addDate} max={todayKey()} onChange={e => e.target.value && setAddDate(e.target.value)}\n              style={{ flex: 1, padding: \"6px 8px\", borderRadius: 8, border: \"1px solid #ddd\", fontSize: 13 }} />\n            <button onClick={() => { const [y,m,d] = addDate.split(\"-\").map(Number); const n = new Date(y,m-1,d); n.setDate(n.getDate()+1); if (dateKeyFromDate(n) <= todayKey()) setAddDate(dateKeyFromDate(n)); }}\n              style={{ width: 30, height: 30, borderRadius: \"50%\", border: \"1px solid #ddd\", background: \"transparent\", cursor: addDate===todayKey()?\"default\":\"pointer\", fontSize: 16, color: addDate===todayKey()?\"#ccc\":\"#333\" }}>\u203a</button>\n          </div>\n        </div>\n        <div style={{ display: \"flex\", gap: 8, marginBottom: 10 }}>\n          {Object.entries(BONUS_TYPES).map(([type, info]) => (\n            <button key={type} onClick={() => addBonus(type, info.pts, info.label, info.icon)} style={{\n              flex: 1, padding: \"10px 8px\", borderRadius: 10, border: saved===info.label ? `2px solid ${k.accent}` : `1.5px solid ${k.accent}40`,\n              background: saved===info.label ? k.light : `${k.accent}10`, cursor: \"pointer\", fontSize: 12, fontWeight: 600, color: k.dark,\n            }}>{info.icon} {info.label}<br /><span style={{ fontSize: 11, fontWeight: 400 }}>+{info.pts} pts</span></button>\n          ))}\n        </div>\n        <div style={{ background: `${k.accent}10`, borderRadius: 10, padding: \"10px 12px\", border: `1px solid ${k.accent}40` }}>\n          <div style={{ fontSize: 12, color: k.dark, marginBottom: 8, fontWeight: 500 }}>Custom bonus</div>\n          <div style={{ display: \"flex\", gap: 8, marginBottom: 8 }}>\n            <div style={{ width: 80 }}>\n              <label style={{ fontSize: 11, color: \"#888\", display: \"block\", marginBottom: 3 }}>Points</label>\n              <input type=\"number\" value={customPts} min={1} max={20} onChange={e => setCustomPts(e.target.value)}\n                style={{ width: \"100%\", padding: \"7px 8px\", borderRadius: 8, border: \"1px solid #ddd\", fontSize: 13 }} />\n            </div>\n            <div style={{ flex: 1 }}>\n              <label style={{ fontSize: 11, color: \"#888\", display: \"block\", marginBottom: 3 }}>Reason</label>\n              <input value={customReason} onChange={e => setCustomReason(e.target.value)} placeholder=\"e.g. Helped with dinner...\"\n                style={{ width: \"100%\", padding: \"7px 10px\", borderRadius: 8, border: \"1px solid #ddd\", fontSize: 13 }} />\n            </div>\n          </div>\n          <button onClick={addCustom} style={{ padding: \"7px 14px\", borderRadius: 8, background: k.accent, color: \"#fff\", border: \"none\", cursor: \"pointer\", fontSize: 13, fontWeight: 600 }}>+ Award</button>\n        </div>\n        {saved && <div style={{ fontSize: 12, color: \"#085041\", marginTop: 8 }}>\u2713 Awarded!</div>}\n      </>}\n    </div>\n  );\n}\n\n// \u2500\u2500 Excuse manager \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction ExcuseManager({ state, dispatch, defaultKid }) {\n  const [kid, setKid] = useState(defaultKid || \"oliver\");\n  useEffect(() => { if (defaultKid) setKid(defaultKid); }, [defaultKid]);\n  const [dateKey, setDateKey] = useState(todayKey());\n  const [reason, setReason] = useState(\"Ill\");\n  const [note, setNote] = useState(\"\");\n  const [saved, setSaved] = useState(false);\n  const excuses = state.excuses || {};\n  const kidExcuses = excuses[kid] || {};\n  const weekExcuses = Object.entries(kidExcuses)\n    .filter(([k]) => isInCurrentWeek(k) || k === dateKey)\n    .sort(([a],[b]) => b.localeCompare(a));\n  const adjTarget = getAdjustedTarget(state.rewards.target, excuses, kid);\n  const adjMin = getAdjustedMin(state.rewards.minPts || 45, excuses, kid);\n  const selectedDateExcused = !!kidExcuses[dateKey];\n\n  const handleExcuse = () => {\n    dispatch({ type: \"EXCUSE_DAY\", kid, dateKey, reason, note });\n    setSaved(true); setNote(\"\");\n    setTimeout(() => setSaved(false), 2000);\n  };\n\n  const dayLabel = (dk) => {\n    const [y,m,d] = dk.split(\"-\").map(Number);\n    return new Date(y,m-1,d).toLocaleDateString(\"en-GB\", { weekday: \"short\", day: \"numeric\", month: \"short\" });\n  };\n\n  return (\n    <div style={{ background: \"#fff\", border: \"1px solid #eee\", borderRadius: 14, padding: 16, marginBottom: 12 }}>\n      <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 4 }}>Excuse a day</div>\n      <div style={{ fontSize: 12, color: \"#888\", marginBottom: 14 }}>\n        Excused days are written off \u2014 the target drops by 13pts and full points are credited for that day.\n      </div>\n      <div style={{ display: \"flex\", gap: 8, marginBottom: 12 }}>\n        {[\"oliver\",\"alfie\"].map(id => (\n          <button key={id} onClick={() => setKid(id)} style={{\n            flex: 1, padding: \"8px\", borderRadius: 10, border: `2px solid ${kid===id ? KIDS[id].accent : \"transparent\"}`,\n            background: KIDS[id].light, color: KIDS[id].dark, fontWeight: 600, fontSize: 13, cursor: \"pointer\",\n          }}>{KIDS[id].label}</button>\n        ))}\n      </div>\n      <div style={{ display: \"flex\", gap: 8, marginBottom: 8, flexWrap: \"wrap\" }}>\n        <div style={{ flex: 1, minWidth: 130 }}>\n          <label style={{ fontSize: 12, color: \"#888\", display: \"block\", marginBottom: 4 }}>Date</label>\n          <div style={{ display: \"flex\", alignItems: \"center\", gap: 4 }}>\n            <button onClick={() => { const [y,m,d] = dateKey.split(\"-\").map(Number); const p = new Date(y,m-1,d); p.setDate(p.getDate()-1); setDateKey(dateKeyFromDate(p)); }}\n              style={{ width: 28, height: 28, borderRadius: \"50%\", border: \"1px solid #ddd\", background: \"transparent\", cursor: \"pointer\", fontSize: 16 }}>&#8249;</button>\n            <input type=\"date\" value={dateKey} max={todayKey()} onChange={e => e.target.value && setDateKey(e.target.value)}\n              style={{ flex: 1, padding: \"7px 6px\", borderRadius: 8, border: \"1px solid #ddd\", fontSize: 12 }} />\n            <button onClick={() => { const [y,m,d] = dateKey.split(\"-\").map(Number); const n = new Date(y,m-1,d); n.setDate(n.getDate()+1); if (dateKeyFromDate(n) <= todayKey()) setDateKey(dateKeyFromDate(n)); }}\n              style={{ width: 28, height: 28, borderRadius: \"50%\", border: \"1px solid #ddd\", background: \"transparent\", cursor: dateKey === todayKey() ? \"default\" : \"pointer\", fontSize: 16, color: dateKey === todayKey() ? \"#ccc\" : \"#333\" }}>&#8250;</button>\n          </div>\n        </div>\n        <div style={{ flex: 1, minWidth: 120 }}>\n          <label style={{ fontSize: 12, color: \"#888\", display: \"block\", marginBottom: 4 }}>Reason</label>\n          <select value={reason} onChange={e => setReason(e.target.value)}\n            style={{ width: \"100%\", padding: \"7px 10px\", borderRadius: 8, border: \"1px solid #ddd\", fontSize: 13 }}>\n            {EXCUSE_REASONS.map(r => <option key={r}>{r}</option>)}\n          </select>\n        </div>\n      </div>\n      <input value={note} onChange={e => setNote(e.target.value)} placeholder=\"Optional note (e.g. school trip to London)\"\n        style={{ width: \"100%\", padding: \"7px 10px\", borderRadius: 8, border: \"1px solid #ddd\", fontSize: 13, marginBottom: 10 }} />\n      <div style={{ display: \"flex\", alignItems: \"center\", gap: 10, marginBottom: 14 }}>\n        {selectedDateExcused ? (\n          <button onClick={() => dispatch({ type: \"REMOVE_EXCUSE\", kid, dateKey })}\n            style={{ padding: \"8px 16px\", borderRadius: 8, background: \"#A32D2D\", color: \"#fff\", border: \"none\", cursor: \"pointer\", fontSize: 13, fontWeight: 600 }}>\n            \u2715 Remove excuse for this day\n          </button>\n        ) : (\n          <button onClick={handleExcuse}\n            style={{ padding: \"8px 16px\", borderRadius: 8, background: \"#1D9E75\", color: \"#fff\", border: \"none\", cursor: \"pointer\", fontSize: 13, fontWeight: 600 }}>\n            \u2713 Excuse this day\n          </button>\n        )}\n        {saved && <span style={{ fontSize: 13, color: \"#1D9E75\" }}>Saved!</span>}\n      </div>\n      {weekExcuses.length > 0 && (\n        <div>\n          <div style={{ fontSize: 12, fontWeight: 600, color: \"#888\", marginBottom: 8, textTransform: \"uppercase\", letterSpacing: \"0.05em\" }}>\n            Excused days \u2014 {KIDS[kid].label}\n          </div>\n          {weekExcuses.map(([dk, ex]) => (\n            <div key={dk} style={{ display: \"flex\", alignItems: \"center\", gap: 8, padding: \"8px 10px\",\n              background: \"#E1F5EE\", border: \"1px solid #9FE1CB\", borderRadius: 10, marginBottom: 6, fontSize: 13 }}>\n              <span>\ud83c\udfe5</span>\n              <span style={{ flex: 1, color: \"#085041\" }}><strong>{dayLabel(dk)}</strong> \u2014 {ex.reason}{ex.note ? ` (${ex.note})` : \"\"}</span>\n              <button onClick={() => dispatch({ type: \"REMOVE_EXCUSE\", kid, dateKey: dk })}\n                style={{ padding: \"3px 8px\", borderRadius: 6, border: \"1px solid #9FE1CB\", background: \"transparent\", cursor: \"pointer\", fontSize: 12, color: \"#0F6E56\" }}>\n                \u2715 Remove\n              </button>\n            </div>\n          ))}\n          <div style={{ fontSize: 12, color: \"#888\", marginTop: 8 }}>\n            Adjusted target this week: <strong>{adjTarget} pts</strong> \u00b7 Minimum: <strong>{adjMin} pts</strong>\n          </div>\n        </div>\n      )}\n    </div>\n  );\n}\n\n\n// \u2500\u2500 History tab content \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction HistoryTabContent({ state, dispatch, TEST_DATA, hasTestData, target, amount, minPts, getDayBreakdown, btn }) {\n  const [expandedIndex, setExpandedIndex] = useState(null);\n  const [expandedKid, setExpandedKid] = useState(\"oliver\");\n\n  const calcEarnedLocal = (pts, tgt, amt, mn) => {\n    if (pts < mn) return 0;\n    if (pts <= tgt) return parseFloat(((pts / tgt) * amt).toFixed(2));\n    // Above target \u2014 base amount plus bonus at same rate\n    return parseFloat((amt + ((pts - tgt) / tgt) * amt).toFixed(2));\n  };\n\n  return (\n    <div>\n      {/* Test data controls */}\n      <div style={{ marginBottom: 16, padding: \"10px 14px\", background: \"#f7f7ff\", borderRadius: 12, border: \"1px solid #e8e5ff\" }}>\n        <div style={{ display: \"flex\", alignItems: \"center\", gap: 8, marginBottom: hasTestData ? 8 : 0 }}>\n          <span style={{ fontSize: 12, color: \"#534AB7\", flex: 1 }}>\ud83e\uddea Preview with test data</span>\n          {!hasTestData\n            ? <button onClick={() => dispatch({\n                type: \"LOAD_TEST_CHECKS\",\n                checks: {\n    oliver: {\n      \"2026-06-01\": {'1': true, '2': true, '3': true, '4': true, '5': true, '6': true, '7': true, '9': true, '10': true, '11': true, '12': true, '13': true, '16': true},\n      \"2026-06-02\": {'1': true, '2': true, '3': true, '4': true, '5': true, '6': true, '7': true, '9': true, '10': true, '11': true, '12': true, '13': true, '16': true},\n      \"2026-06-03\": {'1': true, '2': true, '3': true, '4': true, '5': true, '6': true, '7': true, '9': true, '10': true, '11': true},\n      \"2026-06-05\": {'1': true, '2': true, '3': true, '4': true, '5': true, '6': true, '7': true, '9': true, '10': true, '11': true, '12': true, '13': true, '16': true},\n    },\n    alfie: {\n      \"2026-06-01\": {'1': true, '2': true, '3': true, '4': true, '5': true, '6': true, '7': true, '9': true, '10': true, '11': true, '12': true, '13': true, '16': true},\n      \"2026-06-02\": {'1': true, '2': true, '3': true, '5': true, '6': true, '7': true, '9': true, '10': true, '11': true, '12': true},\n      \"2026-06-03\": {'1': true, '2': true, '3': true, '4': true, '5': true, '6': true, '7': true, '9': true, '10': true, '11': true, '12': true, '13': true, '16': true},\n      \"2026-06-04\": {'1': true, '2': true, '3': true, '4': true, '5': true, '6': true, '7': true, '9': true, '10': true, '11': true, '12': true, '13': true, '16': true},\n      \"2026-06-05\": {'1': true, '2': true, '3': true, '4': true, '5': true, '6': true, '7': true, '9': true, '10': true, '11': true},\n    },\n  },\n                excuses: {\n    oliver: { \"2026-06-04\": { reason: \"Ill\", note: \"temperature, stayed in bed\" } },\n    alfie: {},\n  },\n                penalties: {\n    oliver: {},\n    alfie: { \"2026-06-03\": [{ type: \"detention\", id: 9999001 }] },\n  },\n                historyEntry: { week: \"1 Jun 2026\", oliverPts: 62, alfiePts: 56, paid: false, loggedAt: \"2026-06-05T20:00:00Z\", auto: true },\n              })}\n                style={{ padding: \"6px 14px\", borderRadius: 8, background: \"#7F77DD\", color: \"#fff\", border: \"none\", cursor: \"pointer\", fontSize: 12, fontWeight: 600 }}>\n                Load test data\n              </button>\n            : <button onClick={() => dispatch({ type: \"CLEAR_TEST_CHECKS\", days: ['2026-06-01', '2026-06-02', '2026-06-03', '2026-06-04', '2026-06-05'], weekLabel: \"1 Jun 2026\" })}\n                style={{ padding: \"6px 14px\", borderRadius: 8, background: \"transparent\", border: \"1px solid #f7c1c1\", cursor: \"pointer\", fontSize: 12, color: \"#a32d2d\" }}>\n                Clear test data\n              </button>\n          }\n        </div>\n        {hasTestData && <div style={{ fontSize: 11, color: \"#534AB7\" }}>\n          Week of 1 Jun 2026 loaded \u2014 Oliver excused Thu (ill), Alfie detention Wed. Tap the week row below to expand.\n        </div>}\n      </div>\n\n      {(!state.history || state.history.length === 0)\n        ? <div style={{ textAlign: \"center\", padding: \"3rem 1rem\", color: \"#aaa\", fontSize: 14 }}>No history yet. Log a completed week in the Rewards tab, or load test data above.</div>\n        : [...state.history].reverse().map((h, ri) => {\n            const i = state.history.length - 1 - ri;\n            const oEarned = calcEarnedLocal(h.oliverPts, target, amount, minPts);\n            const aEarned = calcEarnedLocal(h.alfiePts, target, amount, minPts);\n            const isExpanded = expandedIndex === i;\n            const breakdown = isExpanded ? getDayBreakdown(h) : null;\n            const days = breakdown?.days || [];\n            const hasAnyData = breakdown?.hasAnyData ?? false;\n\n            return (\n              <div key={i} style={{ marginBottom: 8, border: \"1px solid #eee\", borderRadius: 14, overflow: \"hidden\", background: \"#fff\" }}>\n                {/* Week header row \u2014 tap to expand */}\n                <div onClick={() => setExpandedIndex(isExpanded ? null : i)}\n                  style={{ display: \"flex\", alignItems: \"center\", gap: 10, padding: \"12px 14px\", cursor: \"pointer\",\n                    background: isExpanded ? \"#fafafa\" : \"#fff\", borderBottom: isExpanded ? \"1px solid #eee\" : \"none\" }}>\n                  <div style={{ flex: 1 }}>\n                    <div style={{ fontWeight: 600, marginBottom: 4, fontSize: 14 }}>\n                      {h.week}\n                      <span style={{ fontSize: 12, color: \"#aaa\", fontWeight: 400, marginLeft: 8 }}>tap to {isExpanded ? \"close\" : \"expand\"}</span>\n                    </div>\n                    <div style={{ display: \"flex\", gap: 8, flexWrap: \"wrap\" }}>\n                      <span style={{ fontSize: 12, background: \"#EEEDFE\", color: \"#3C3489\", padding: \"2px 9px\", borderRadius: 99 }}>\n                        Oliver: {h.oliverPts}pts \u2192 \u00a3{oEarned.toFixed(2)}\n                        {h.oliverPts < minPts && <span style={{ color: \"#A32D2D\" }}> \u26a0\ufe0f</span>}\n                      </span>\n                      <span style={{ fontSize: 12, background: \"#E1F5EE\", color: \"#085041\", padding: \"2px 9px\", borderRadius: 99 }}>\n                        Alfie: {h.alfiePts}pts \u2192 \u00a3{aEarned.toFixed(2)}\n                        {h.alfiePts < minPts && <span style={{ color: \"#A32D2D\" }}> \u26a0\ufe0f</span>}\n                      </span>\n                    </div>\n                  </div>\n                  <div style={{ display: \"flex\", flexDirection: \"column\", alignItems: \"flex-end\", gap: 4 }}>\n                    {h.paid\n                      ? <span style={{ fontSize: 11, background: \"#EAF3DE\", color: \"#27500A\", padding: \"3px 10px\", borderRadius: 99, fontWeight: 600 }}>\u2713 Paid</span>\n                      : <button onClick={e => { e.stopPropagation(); dispatch({ type: \"MARK_PAID\", index: i }); }}\n                          style={{ padding: \"5px 11px\", borderRadius: 8, border: \"1px solid #ddd\", background: \"transparent\", cursor: \"pointer\", fontSize: 12 }}>\n                          \ud83d\udcb7 Mark paid\n                        </button>\n                    }\n                    <button onClick={e => { e.stopPropagation(); dispatch({ type: \"DELETE_HISTORY\", index: i }); }}\n                      style={{ padding: \"3px 8px\", borderRadius: 7, border: \"1px solid #f7c1c1\", background: \"transparent\", cursor: \"pointer\", fontSize: 11, color: \"#a32d2d\" }}>\n                      \ud83d\uddd1 Delete\n                    </button>\n                  </div>\n                  <span style={{ fontSize: 18, color: \"#ccc\", marginLeft: 4 }}>{isExpanded ? \"\u25b2\" : \"\u25bc\"}</span>\n                </div>\n\n                {/* Expanded day-by-day breakdown */}\n                {isExpanded && (\n                  <div style={{ padding: \"12px 14px\" }}>\n                    {/* Kid switcher inside expanded view */}\n                    <div style={{ display: \"flex\", gap: 6, marginBottom: 12 }}>\n                      {[\"oliver\",\"alfie\"].map(id => (\n                        <button key={id} onClick={() => setExpandedKid(id)} style={{\n                          padding: \"5px 14px\", borderRadius: 99, fontSize: 12, fontWeight: 600, cursor: \"pointer\",\n                          border: `2px solid ${expandedKid===id ? KIDS[id].accent : \"transparent\"}`,\n                          background: KIDS[id].light, color: KIDS[id].dark,\n                        }}>{KIDS[id].label}</button>\n                      ))}\n                    </div>\n\n                    {!hasAnyData && (\n                      <div style={{ textAlign: \"center\", padding: \"1rem\", color: \"#aaa\", fontSize: 13, background: \"#fafafa\", borderRadius: 10, marginBottom: 10 }}>\n                        \ud83d\udccb Detailed day-by-day data isn't stored for older weeks \u2014 only available for weeks logged going forward.\n                      </div>\n                    )}\n                    {days.map(({ dk, dayName, oPts, aPts, oExcuse, aExcuse, oPens, aPens, oBonuses, aBonuses, oAB, aAB, oRejections, aRejections, oTicked, aTicked, choreTasks }) => {\n                      const isOliver = expandedKid === \"oliver\";\n                      const k = KIDS[expandedKid];\n                      const excuse = isOliver ? oExcuse : aExcuse;\n                      const pens = isOliver ? oPens : aPens;\n                      const bons = isOliver ? oBonuses : aBonuses;\n                      const rejs = isOliver ? oRejections : aRejections;\n                      // Use raw checks directly for reliable ticked detection\n                      const rawChecks = isOliver\n                        ? (state.checks?.oliver||{})[dk]||{}\n                        : (state.checks?.alfie||{})[dk]||{};\n                      const rawPts = isOliver ? oPts : aPts;\n                      const abItems = (isOliver ? (oAB||[]) : (aAB||[])).filter(x => x.status === \"approved\" || !x.status);\n                      const abPts = abItems.reduce((s,x) => s + (x.pts||0), 0);\n                      const penPts = pens.reduce((s,p) => s + (p.pts || PENALTY_TYPES[p.type]?.pts||0), 0);\n                      const bonPts = bons.reduce((s,b) => s + (b.pts||0), 0);\n                      const netDay = excuse ? 13 : Math.max(0, rawPts + abPts + bonPts - penPts);\n                      const isWeekendDk = (() => { const [y,m,d] = dk.split(\"-\").map(Number); const dow = new Date(y,m-1,d).getDay(); return dow===0||dow===6; })();\n\n                      return (\n                        <div key={dk} style={{ marginBottom: 8, padding: \"10px 12px\",\n                          background: excuse ? \"#E1F5EE\" : \"#fafafa\",\n                          borderRadius: 12, border: `1px solid ${excuse ? \"#9FE1CB\" : \"#f0f0f0\"}` }}>\n\n                          {/* Day header with pts */}\n                          <div style={{ display: \"flex\", justifyContent: \"space-between\", alignItems: \"center\", marginBottom: 6 }}>\n                            <span style={{ fontSize: 13, fontWeight: 600, color: \"#333\" }}>{dayName}</span>\n                            <span style={{ fontSize: 13, fontWeight: 700, color: excuse ? \"#085041\" : netDay > 0 ? k.dark : \"#aaa\" }}>\n                              {netDay}pt\n                            </span>\n                          </div>\n\n                          {/* Excuse reason */}\n                          {excuse && (\n                            <div style={{ fontSize: 11, color: \"#0F6E56\", marginBottom: 4 }}>\n                              \ud83c\udfe5 {excuse.reason}{excuse.note ? ` \u2014 ${excuse.note}` : \"\"}\n                            </div>\n                          )}\n\n                          {/* Bonus / penalty / A&B pills */}\n                          {(bonPts > 0 || penPts > 0 || abPts > 0) && (\n                            <div style={{ display: \"flex\", gap: 4, flexWrap: \"wrap\", marginBottom: 6 }}>\n                              {bons.map(b => (\n                                <span key={b.id} style={{ fontSize: 10, padding: \"2px 8px\", borderRadius: 99, background: \"#FEF3E2\", color: \"#8B5E00\", fontWeight: 600, border: \"1px solid #F6C96E\" }}>\n                                  \ud83c\udf1f +{b.pts}pt {b.label}\n                                </span>\n                              ))}\n                              {abItems.map(x => (\n                                <span key={x.id} style={{ fontSize: 10, padding: \"2px 8px\", borderRadius: 99, background: \"#EEEDFE\", color: \"#3C3489\", fontWeight: 600, border: \"1px solid #C9C5F0\" }}>\n                                  \u2b50 +{x.pts}pt {x.desc}\n                                </span>\n                              ))}\n                              {pens.map(p => (\n                                <span key={p.id} style={{ fontSize: 10, padding: \"2px 8px\", borderRadius: 99, background: \"#FCEBEB\", color: \"#A32D2D\", fontWeight: 600, border: \"1px solid #F7C1C1\" }}>\n                                  \u26a0\ufe0f \u2212{p.pts||PENALTY_TYPES[p.type]?.pts||0}pt {p.label||PENALTY_TYPES[p.type]?.label}\n                                </span>\n                              ))}\n                            </div>\n                          )}\n\n                          {/* Chore task pills \u2014 green if done, red if not */}\n                          {!excuse && !isWeekendDk && choreTasks.length > 0 && (\n                            <div style={{ display: \"flex\", flexWrap: \"wrap\", gap: 3 }}>\n                              {choreTasks.map(t => {\n                                const done = !!(rawChecks[String(t.id)] || rawChecks[t.id]);\n                                return (\n                                  <span key={t.id} style={{\n                                    fontSize: 10, padding: \"2px 8px\", borderRadius: 99, fontWeight: 600,\n                                    background: done ? \"#E1F5EE\" : \"#FCEBEB\",\n                                    color: done ? \"#085041\" : \"#A32D2D\",\n                                    border: `1px solid ${done ? \"#9FE1CB\" : \"#F7C1C1\"}`,\n                                  }}>\n                                    {done ? \"\u2713\" : \"\u2717\"} {t.name}\n                                  </span>\n                                );\n                              })}\n                            </div>\n                          )}\n                        </div>\n                      );\n                    })}\n                  </div>\n                )}\n              </div>\n            );\n          })\n      }\n    </div>\n  );\n}\n\n\n// \u2500\u2500 Review panel \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction ReviewPanel({ state, dispatch, kid }) {\n  const pending = state.pending || {};\n  const kidPending = pending[kid] || {};\n  const k = KIDS[kid];\n  const [rejectingId, setRejectingId] = useState(null); // \"dk:taskId\" or \"dk:all\"\n  const [rejectReason, setRejectReason] = useState(\"\");\n\n  const pendingDays = Object.entries(kidPending)\n    .filter(([dk, items]) => isInCurrentWeek(dk) && Object.values(items).some(Boolean))\n    .sort(([a],[b]) => a.localeCompare(b));\n\n  if (pendingDays.length === 0) return (\n    <div style={{ background: \"#f9fafb\", border: \"1px solid #eee\", borderRadius: 12, padding: \"12px 16px\", marginBottom: 12, fontSize: 13, color: \"#aaa\", textAlign: \"center\" }}>\n      \u2713 No pending approvals for {k.label}\n    </div>\n  );\n\n  const dayLabel = (dk) => {\n    const [y,m,d] = dk.split(\"-\").map(Number);\n    return new Date(y,m-1,d).toLocaleDateString(\"en-GB\", { weekday: \"long\", day: \"numeric\", month: \"short\" });\n  };\n\n  const startReject = (key) => { setRejectingId(key); setRejectReason(\"\"); };\n  const cancelReject = () => { setRejectingId(null); setRejectReason(\"\"); };\n\n  const confirmReject = (dk, taskId) => {\n    if (taskId === \"all\") {\n      dispatch({ type: \"REJECT_ALL_DAY\", kid, dk, reason: rejectReason });\n    } else {\n      dispatch({ type: \"REJECT_TASK\", kid, dk, taskId, reason: rejectReason });\n    }\n    setRejectingId(null); setRejectReason(\"\");\n  };\n\n  return (\n    <div style={{ marginBottom: 12 }}>\n      {pendingDays.map(([dk, items]) => {\n        const pendingTasks = getTasksForDate(state, dk, kid).filter(t => !t.schedule && items[t.id]);\n        if (!pendingTasks.length) return null;\n        const rejectAllKey = `${dk}:all`;\n        return (\n          <div key={dk} style={{ background: \"#FFFBEA\", border: \"1px solid #FAC775\", borderRadius: 12, padding: \"12px 14px\", marginBottom: 10 }}>\n            <div style={{ display: \"flex\", alignItems: \"center\", justifyContent: \"space-between\", marginBottom: 10 }}>\n              <span style={{ fontSize: 13, fontWeight: 600, color: \"#633806\" }}>{dayLabel(dk)}</span>\n              <div style={{ display: \"flex\", gap: 6 }}>\n                <button onClick={() => dispatch({ type: \"APPROVE_ALL_DAY\", kid, dk })}\n                  style={{ padding: \"5px 12px\", borderRadius: 8, background: k.accent, color: \"#fff\", border: \"none\", cursor: \"pointer\", fontSize: 12, fontWeight: 600 }}>\n                  \u2713 Approve all\n                </button>\n                <button onClick={() => startReject(rejectAllKey)}\n                  style={{ padding: \"5px 12px\", borderRadius: 8, background: \"transparent\", border: \"1px solid #F7C1C1\", cursor: \"pointer\", fontSize: 12, color: \"#A32D2D\" }}>\n                  \u2717 Reject all\n                </button>\n              </div>\n            </div>\n\n            {/* Reject all reason box */}\n            {rejectingId === rejectAllKey && (\n              <div style={{ background: \"#FCEBEB\", border: \"1px solid #F7C1C1\", borderRadius: 10, padding: \"10px 12px\", marginBottom: 8 }}>\n                <div style={{ fontSize: 12, color: \"#A32D2D\", fontWeight: 600, marginBottom: 6 }}>Reason for rejecting all? (optional)</div>\n                <input value={rejectReason} onChange={e => setRejectReason(e.target.value)}\n                  placeholder=\"e.g. Room still not tidy, didn't see this done...\"\n                  style={{ width: \"100%\", padding: \"7px 10px\", borderRadius: 8, border: \"1px solid #F7C1C1\", fontSize: 13, marginBottom: 8 }}\n                  autoFocus />\n                <div style={{ display: \"flex\", gap: 6 }}>\n                  <button onClick={() => confirmReject(dk, \"all\")}\n                    style={{ padding: \"6px 14px\", borderRadius: 8, background: \"#A32D2D\", color: \"#fff\", border: \"none\", cursor: \"pointer\", fontSize: 12, fontWeight: 600 }}>\n                    Confirm reject all\n                  </button>\n                  <button onClick={cancelReject}\n                    style={{ padding: \"6px 12px\", borderRadius: 8, background: \"transparent\", border: \"1px solid #ddd\", cursor: \"pointer\", fontSize: 12 }}>\n                    Cancel\n                  </button>\n                </div>\n              </div>\n            )}\n\n            {pendingTasks.map(t => {\n              const rejectKey = `${dk}:${t.id}`;\n              return (\n                <div key={t.id} style={{ marginBottom: 6 }}>\n                  <div style={{ display: \"flex\", alignItems: \"center\", gap: 8, padding: \"7px 10px\",\n                    background: \"#fff\", border: \"1px solid #FAC775\", borderRadius: 10 }}>\n                    <span style={{ fontSize: 13, flex: 1 }}>{t.name}</span>\n                    <button onClick={() => dispatch({ type: \"APPROVE_TASK\", kid, dk, taskId: t.id })}\n                      style={{ padding: \"4px 10px\", borderRadius: 7, background: k.light, border: `1px solid ${k.accent}`, cursor: \"pointer\", fontSize: 12, color: k.dark, fontWeight: 600 }}>\n                      \u2713\n                    </button>\n                    <button onClick={() => rejectingId === rejectKey ? cancelReject() : startReject(rejectKey)}\n                      style={{ padding: \"4px 10px\", borderRadius: 7, background: \"#FCEBEB\", border: \"1px solid #F7C1C1\", cursor: \"pointer\", fontSize: 12, color: \"#A32D2D\", fontWeight: 600 }}>\n                      \u2717\n                    </button>\n                  </div>\n                  {/* Per-task reject reason box */}\n                  {rejectingId === rejectKey && (\n                    <div style={{ background: \"#FCEBEB\", border: \"1px solid #F7C1C1\", borderRadius: \"0 0 10px 10px\", padding: \"8px 10px\", marginTop: -4 }}>\n                      <input value={rejectReason} onChange={e => setRejectReason(e.target.value)}\n                        placeholder=\"Reason (optional) \u2014 e.g. still messy, didn't see it done\"\n                        style={{ width: \"100%\", padding: \"6px 10px\", borderRadius: 8, border: \"1px solid #F7C1C1\", fontSize: 12, marginBottom: 6 }}\n                        autoFocus />\n                      <div style={{ display: \"flex\", gap: 6 }}>\n                        <button onClick={() => confirmReject(dk, t.id)}\n                          style={{ padding: \"5px 12px\", borderRadius: 7, background: \"#A32D2D\", color: \"#fff\", border: \"none\", cursor: \"pointer\", fontSize: 12, fontWeight: 600 }}>\n                          Confirm\n                        </button>\n                        <button onClick={cancelReject}\n                          style={{ padding: \"5px 10px\", borderRadius: 7, background: \"transparent\", border: \"1px solid #ddd\", cursor: \"pointer\", fontSize: 12 }}>\n                          Cancel\n                        </button>\n                      </div>\n                    </div>\n                  )}\n                </div>\n              );\n            })}\n          </div>\n        );\n      })}\n    </div>\n  );\n}\n\n\nfunction ParentChoreItem({ t, k, kid, viewDate, dayChecks, pending, onToggle }) {\n  const isApproved = !!(dayChecks[t.id]);\n  const isPend = !isApproved && !!((pending[kid] || {})[viewDate]?.[t.id]);\n  return (\n    <div onClick={onToggle} style={{ display: \"flex\", alignItems: \"center\", gap: 12, padding: \"11px 14px\", marginBottom: 5,\n      background: isApproved ? k.light : isPend ? \"#FFFBEA\" : \"#fff\",\n      border: `1px solid ${isApproved ? k.accent : isPend ? \"#FAC775\" : \"#e8e8e8\"}`,\n      borderRadius: 11, cursor: \"pointer\" }}>\n      <div style={{ width: 22, height: 22, borderRadius: \"50%\", flexShrink: 0, display: \"flex\", alignItems: \"center\", justifyContent: \"center\",\n        background: isApproved ? k.accent : isPend ? \"#FAC775\" : \"transparent\",\n        border: `2px solid ${isApproved ? k.accent : isPend ? \"#FAC775\" : \"#ccc\"}` }}>\n        {isApproved && <span style={{ color: \"#fff\", fontSize: 12 }}>\u2713</span>}\n        {isPend && <span style={{ fontSize: 11 }}>\u23f3</span>}\n      </div>\n      <span style={{ flex: 1, fontSize: 14 }}>{t.name}</span>\n      <span style={{ fontSize: 11, padding: \"2px 8px\", borderRadius: 99,\n        color: isApproved ? k.mid : isPend ? \"#BA7517\" : \"#999\",\n        background: isApproved ? k.light : isPend ? \"#FAEEDA\" : \"#f5f5f5\" }}>\n        {isApproved ? \"\u2713 approved\" : isPend ? \"\u23f3 pending\" : \"1pt\"}\n      </span>\n    </div>\n  );\n}\n\n\n// \u2500\u2500 Progress tab \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction ProgressTab({ state, dispatch }) {\n  const [weekOffset, setWeekOffset] = useState(0); // 0 = current week, -1 = last week etc\n\n  // Calculate the Saturday start for the displayed week\n  const viewSat = (() => {\n    const s = getWeekStartSat();\n    s.setDate(s.getDate() + weekOffset * 7);\n    return s;\n  })();\n\n  const weekDays = Array.from({ length: 7 }, (_, i) => {\n    const d = new Date(viewSat); d.setDate(viewSat.getDate() + i);\n    const dow = d.getDay();\n    return {\n      dk: dateKeyFromDate(d),\n      label: d.toLocaleDateString(\"en-GB\", { weekday: \"short\", day: \"numeric\", month: \"short\" }),\n      isFri: dow === 5,\n      isWknd: dow === 0 || dow === 6,\n    };\n  });\n  const todayDk = todayKey();\n  const isCurrentWeek = weekOffset === 0;\n  const weekLabel = viewSat.toLocaleDateString(\"en-GB\", { day: \"numeric\", month: \"short\" }) + \" \u2013 \" +\n    new Date(viewSat.getFullYear(), viewSat.getMonth(), viewSat.getDate() + 6).toLocaleDateString(\"en-GB\", { day: \"numeric\", month: \"short\" });\n\n  // Week is completable if today is AFTER the Friday (i.e. Saturday or later)\n  const viewSatDk = dateKeyFromDate(viewSat);\n  const viewFriDk = (() => { const d = new Date(viewSat); d.setDate(viewSat.getDate() + 6); return dateKeyFromDate(d); })();\n  const isInViewWeek = (dk) => dk >= viewSatDk && dk <= viewFriDk;\n  const canComplete = todayDk > viewFriDk;\n\n  return (\n    <div>\n      {/* Week navigator */}\n      <div style={{ display: \"flex\", alignItems: \"center\", justifyContent: \"space-between\", marginBottom: 12, background: \"#f5f5f5\", borderRadius: 12, padding: \"8px 12px\" }}>\n        <button onClick={() => setWeekOffset(o => o - 1)}\n          style={{ width: 32, height: 32, borderRadius: \"50%\", border: \"none\", background: \"transparent\", cursor: \"pointer\", fontSize: 20, color: \"#555\" }}>\u2039</button>\n        <div style={{ textAlign: \"center\" }}>\n          <div style={{ fontSize: 13, fontWeight: 700, color: \"#333\" }}>{weekLabel}</div>\n          <div style={{ fontSize: 11, color: \"#888\" }}>{isCurrentWeek ? \"This week\" : \"Past week\"}</div>\n        </div>\n        <button onClick={() => setWeekOffset(o => Math.min(0, o + 1))}\n          style={{ width: 32, height: 32, borderRadius: \"50%\", border: \"none\", background: \"transparent\",\n            cursor: isCurrentWeek ? \"default\" : \"pointer\", fontSize: 20, color: isCurrentWeek ? \"#ccc\" : \"#555\" }}>\u203a</button>\n      </div>\n\n      {/* Complete Week button \u2014 shows for any past week */}\n      {canComplete && (() => {\n        const weekKeys = Array.from({ length: 7 }, (_, i) => {\n          const d = new Date(viewSat); d.setDate(viewSat.getDate() + i);\n          return dateKeyFromDate(d);\n        });\n        const wkLabel = viewSat.toLocaleDateString(\"en-GB\", { day: \"numeric\", month: \"short\", year: \"numeric\" });\n\n        return (\n          <div style={{ background: \"#EEEDFE\", border: \"2px solid #7F77DD\", borderRadius: 14, padding: 16, marginBottom: 16 }}>\n            <div style={{ fontSize: 14, fontWeight: 700, color: \"#3C3489\", marginBottom: 4 }}>\ud83c\udfc1 Complete week of {wkLabel}</div>\n            <div style={{ fontSize: 12, color: \"#534AB7\", marginBottom: 12 }}>\n              Completes each boy individually. Archives the week and clears their data.\n            </div>\n            <div style={{ display: \"flex\", gap: 10 }}>\n              {[\"oliver\",\"alfie\"].map(kid => {\n                const k = KIDS[kid];\n                const filterWk = (obj) => Object.fromEntries(Object.entries(obj?.[kid] || {}).filter(([dk]) => weekKeys.includes(dk)));\n                const cChecks = { [kid]: filterWk(state.checks) };\n                const cExcuses = { [kid]: filterWk(state.excuses) };\n                const cPens = { [kid]: filterWk(state.penalties) };\n                const cBons = { [kid]: filterWk(state.bonuses) };\n                const cPend = { [kid]: filterWk(state.pending) };\n                const cAB = { [kid]: filterWk(state.aboveBeyond) };\n                const pts = netPts(cChecks, cExcuses, cPens, kid, cBons, cPend, cAB, true);\n                const { amount, target, minPts: baseMin = 45 } = state.rewards;\n                const earned = calcEarned(pts, target, amount, baseMin);\n                const entry = { week: wkLabel, paid: false, weekKeys, [kid+\"Pts\"]: pts, [kid+\"Earned\"]: earned };\n                return (\n                  <div key={kid} style={{ flex: 1, background: \"#fff\", borderRadius: 12, padding: 12, border: `2px solid ${k.accent}` }}>\n                    <div style={{ fontSize: 14, fontWeight: 700, color: k.dark, marginBottom: 2 }}>{k.label}</div>\n                    <div style={{ fontSize: 22, fontWeight: 700, color: k.dark }}>\u00a3{earned.toFixed(2)}</div>\n                    <div style={{ fontSize: 11, color: \"#888\", marginBottom: 10 }}>{pts} pts</div>\n                    <button onClick={() => dispatch({ type: \"COMPLETE_WEEK\", entry, weekKeys, kid })}\n                      style={{ width: \"100%\", padding: \"8px\", borderRadius: 8, background: k.accent, color: \"#fff\",\n                        border: \"none\", cursor: \"pointer\", fontSize: 12, fontWeight: 700 }}>\n                      \ud83c\udfc1 Complete {k.label}'s week\n                    </button>\n                  </div>\n                );\n              })}\n            </div>\n          </div>\n        );\n      })()}\n\n      {/* Pending approvals for both boys */}\n      {[\"oliver\",\"alfie\"].map(kid => {\n        const k = KIDS[kid];\n        const pendingData = state.pending || {};\n        const aboveBeyondData = state.aboveBeyond || {};\n        const hasPending = getPendingDayCount(pendingData, kid) > 0;\n        const hasAB = Object.values(aboveBeyondData[kid] || {}).some(list => list.some(x => x.status === \"pending\"));\n        if (!hasPending && !hasAB) return null;\n        return (\n          <div key={`review-${kid}`} style={{ background: \"#FFFBEA\", border: \"1px solid #FAC775\", borderRadius: 14, padding: 14, marginBottom: 12 }}>\n            <div style={{ fontSize: 13, fontWeight: 700, color: k.dark, marginBottom: 10 }}>\n              \u23f3 {k.label} \u2014 pending review\n            </div>\n            {hasPending && <ReviewPanel state={state} dispatch={dispatch} kid={kid} />}\n            {hasAB && <AboveBeyondReview state={state} dispatch={dispatch} kid={kid} />}\n          </div>\n        );\n      })}\n\n      {/* Weekly progress cards */}\n      {[\"oliver\",\"alfie\"].map(kid => {\n        const k = KIDS[kid];\n        const filterWeek = (obj) => Object.fromEntries(Object.entries(obj?.[kid] || {}).filter(([dk]) => isInViewWeek(dk)));\n        const wChecks = { [kid]: filterWeek(state.checks) };\n        const wExcuses = { [kid]: filterWeek(state.excuses) };\n        const wPens = { [kid]: filterWeek(state.penalties) };\n        const wBons = { [kid]: filterWeek(state.bonuses) };\n        const wPend = { [kid]: filterWeek(state.pending) };\n        const wAB = { [kid]: filterWeek(state.aboveBeyond) };\n        const checks = wChecks[kid] || {};\n        const excuses = wExcuses[kid] || {};\n        const penalties = wPens[kid] || {};\n        const bonuses = wBons[kid] || {};\n        const pending = wPend[kid] || {};\n        const wkPts = netPts(wChecks, wExcuses, wPens, kid, wBons, wPend, wAB, true);\n        const approvedPts = netApprovedPts(wChecks, wExcuses, wPens, kid, wBons, wAB, true);\n        const pendingPts = getPendingWeekPts(wPend, kid, excuses);\n        const { target: baseTarget, amount, minPts: baseMin = 45 } = state.rewards;\n        const adjTarget = getAdjustedTarget(baseTarget, wExcuses, kid, true);\n        const adjMin = getAdjustedMin(baseMin, wExcuses, kid, true);\n        const earned = calcEarned(wkPts, adjTarget, amount, adjMin);\n        const approvedEarned = calcEarned(approvedPts, adjTarget, amount, adjMin);\n        const penPts = getWeekPenalties(wPens, kid, wExcuses, true);\n        const bonPts = getWeekBonuses(wBons, kid, wExcuses, true);\n        const aboveTarget = wkPts > adjTarget;\n        const appPct = adjTarget > 0 ? Math.min(100, Math.round(approvedPts / adjTarget * 100)) : 100;\n        const pendPct = adjTarget > 0 ? Math.min(100 - appPct, Math.round(pendingPts / adjTarget * 100)) : 0;\n        const CHORES = 13;\n\n        return (\n          <div key={kid} style={{ background: \"#fff\", border: `2px solid ${k.accent}`, borderRadius: 16, padding: 16, marginBottom: 16 }}>\n            {/* \u2500\u2500 Weekly header \u2500\u2500 */}\n            <div style={{ display: \"flex\", justifyContent: \"space-between\", alignItems: \"flex-start\", marginBottom: 10 }}>\n              <div>\n                <div style={{ fontSize: 16, fontWeight: 700, color: k.dark, marginBottom: 2 }}>{k.label}</div>\n                <div style={{ fontSize: 12, color: \"#888\" }}>{wkPts} / {adjTarget} pts this week</div>\n              </div>\n              <div style={{ textAlign: \"right\" }}>\n                <div style={{ fontSize: 26, fontWeight: 700, color: aboveTarget ? \"#BA7517\" : wkPts < adjMin ? \"#aaa\" : k.dark }}>\n                  \u00a3{calcEarned(wkPts, adjTarget, amount, 0).toFixed(2)}\n                </div>\n                <div style={{ fontSize: 11, color: wkPts < adjMin ? \"#BA7517\" : \"#aaa\" }}>\n                  {aboveTarget ? `\u00a3${amount.toFixed(2)} + bonus` : wkPts < adjMin ? `\ud83d\udd12 need ${adjMin} pts to unlock` : `of \u00a3${amount.toFixed(2)}`}\n                </div>\n              </div>\n            </div>\n\n            {/* \u2500\u2500 Progress bar \u2500\u2500 */}\n            <div style={{ height: 10, borderRadius: 99, background: \"#eee\", overflow: \"hidden\", marginBottom: 4, position: \"relative\" }}>\n              <div style={{ position: \"absolute\", left: 0, top: 0, height: \"100%\", borderRadius: \"99px 0 0 99px\",\n                width: `${appPct}%`, background: APPROVED.icon, transition: \"width 0.4s\" }} />\n              <div style={{ position: \"absolute\", left: `${appPct}%`, top: 0, height: \"100%\",\n                borderRadius: appPct===0 ? 99 : \"0 99px 99px 0\",\n                width: `${pendPct}%`, background: \"#FAC775\", opacity: 0.8 }} />\n            </div>\n            <div style={{ display: \"flex\", justifyContent: \"space-between\", fontSize: 11, color: \"#aaa\", marginBottom: 8 }}>\n              <span>{approvedPts} approved{pendingPts > 0 ? ` \u00b7 ${pendingPts} pending` : \"\"}</span>\n              <span>{adjTarget} pts = \u00a3{amount.toFixed(2)}</span>\n            </div>\n\n            {/* \u2500\u2500 Daily breakdown \u2500\u2500 */}\n            <div style={{ borderTop: \"1px solid #f0f0f0\", paddingTop: 10 }}>\n              <div style={{ fontSize: 11, fontWeight: 600, color: \"#888\", textTransform: \"uppercase\", letterSpacing: \"0.06em\", marginBottom: 8 }}>Daily breakdown</div>\n              {weekDays.map(({ dk, label, isFri }) => {\n                const isFuture = dk > todayDk;\n                const excuse = (wExcuses[kid] || {})[dk];\n                const dayChecks = (wChecks[kid] || {})[dk] || {};\n                const dayPending = (wPend[kid] || {})[dk] || {};\n                const dayPens = (wPens[kid] || {})[dk] || [];\n                const dayBons = (wBons[kid] || {})[dk] || [];\n                const approvedCount = Object.values(dayChecks).filter(Boolean).length;\n                const pendingCount = Object.values(dayPending).filter(Boolean).length;\n                const dayABItems = (state.aboveBeyond?.[kid]?.[dk]) || [];\n                const dayABPts = dayABItems\n                  .filter(x => x.status === \"approved\").reduce((s, x) => s + (x.pts || 0), 0);\n                const dayPenPts = dayPens.reduce((s,p) => s + (p.pts || PENALTY_TYPES[p.type]?.pts || 0), 0);\n                const dayBonPts = dayBons.reduce((s,b) => s + (b.pts || 0), 0);\n                const taskList = getTasksForDate(state, dk, kid);\n                const choreCount = Math.max(1, taskList.filter(t => !t.schedule).length);\n                // excused day = exactly choreCount pts (13), no double counting with actual ticks\n                // non-excused = actual approved + pending + AB bonuses - penalties\n                const netDay = excuse\n                  ? choreCount + dayABPts + dayBonPts - dayPenPts\n                  : Math.max(0, approvedCount + pendingCount + dayABPts - dayPenPts + dayBonPts);\n\n                let statusColor = \"#aaa\";\n                let statusBg = \"#f5f5f5\";\n                let statusLabel = isFuture ? \"upcoming\" : \"0 pts\";\n                if (excuse) { statusColor = \"#085041\"; statusBg = \"#E1F5EE\"; statusLabel = `\ud83c\udfe5 ${excuse.reason}`; }\n                else if (isFuture) { statusColor = \"#aaa\"; statusBg = \"#f5f5f5\"; statusLabel = \"upcoming\"; }\n                else if (approvedCount + pendingCount === 0 && dayABPts > 0) { statusColor = \"#3C3489\"; statusBg = \"#EEEDFE\"; statusLabel = `\u2b50 above & beyond`; }\n                else if (approvedCount + pendingCount === 0) { statusColor = \"#aaa\"; statusBg = \"#f5f5f5\"; statusLabel = \"nothing ticked\"; }\n                else if (pendingCount > 0 && approvedCount === 0) { statusColor = \"#BA7517\"; statusBg = \"#FAEEDA\"; statusLabel = `\u23f3 ${pendingCount} pending`; }\n                else if (pendingCount > 0) { statusColor = \"#BA7517\"; statusBg = \"#FAEEDA\"; statusLabel = `\u2713${approvedCount} + \u23f3${pendingCount}`; }\n                else { statusColor = k.mid; statusBg = k.light; statusLabel = `\u2713 ${approvedCount}/${choreCount}`; }\n\n                return (\n                  <div key={dk} style={{ padding: \"7px 0\", borderBottom: \"1px solid #f8f8f8\" }}>\n                    <div style={{ display: \"flex\", alignItems: \"center\", gap: 10 }}>\n                      <div style={{ width: 90, flexShrink: 0 }}>\n                        <div style={{ fontSize: 12, fontWeight: 600, color: isFuture ? \"#ccc\" : \"#333\" }}>{label}</div>\n                      </div>\n                      <div style={{ flex: 1 }}>\n                        <div style={{ height: 6, borderRadius: 99, background: \"#eee\", overflow: \"hidden\" }}>\n                          <div style={{ height: \"100%\", borderRadius: 99, background: excuse ? \"#1D9E75\" : approvedCount > 0 ? k.accent : \"#FAC775\",\n                            width: excuse ? \"100%\" : `${Math.min(100, Math.round((approvedCount + pendingCount) / choreCount * 100))}%`,\n                            opacity: isFuture ? 0.2 : 1 }} />\n                        </div>\n                      </div>\n                      <span style={{ fontSize: 11, padding: \"2px 8px\", borderRadius: 99, background: statusBg, color: statusColor, whiteSpace: \"nowrap\", minWidth: 80, textAlign: \"center\" }}>\n                        {statusLabel}\n                      </span>\n                      <span style={{ fontSize: 12, fontWeight: 600, color: isFuture ? \"#ccc\" : excuse ? \"#085041\" : netDay > 0 ? k.dark : \"#aaa\", minWidth: 36, textAlign: \"right\" }}>\n                        {isFuture ? \"\u2014\" : `${netDay}pt`}\n                      </span>\n                    </div>\n                    {(dayBonPts > 0 || dayPenPts > 0 || dayABItems.length > 0) && !isFuture && (\n                      <div style={{ display: \"flex\", gap: 6, marginTop: 4, paddingLeft: 100, flexWrap: \"wrap\" }}>\n                        {dayABItems.filter(x => x.status === \"approved\").map(x => (\n                          <span key={x.id} style={{ fontSize: 10, padding: \"1px 7px\", borderRadius: 99, background: \"#EEEDFE\", color: \"#3C3489\" }}>\n                            \u2b50 +{x.pts}pt {x.desc}\n                          </span>\n                        ))}\n                        {dayBons.map(b => (\n                          <span key={b.id} style={{ fontSize: 10, padding: \"1px 7px\", borderRadius: 99, background: \"#E1F5EE\", color: \"#085041\" }}>\n                            \ud83c\udf1f +{b.pts}pt {b.label}\n                          </span>\n                        ))}\n                        {dayPens.map(p => (\n                          <span key={p.id} style={{ fontSize: 10, padding: \"1px 7px\", borderRadius: 99, background: \"#FCEBEB\", color: \"#A32D2D\" }}>\n                            \u26a0\ufe0f \u2212{p.pts || PENALTY_TYPES[p.type]?.pts || 0}pt {p.label || PENALTY_TYPES[p.type]?.label}\n                          </span>\n                        ))}\n                      </div>\n                    )}\n                  </div>\n                );\n              })}\n            </div>\n          </div>\n        );\n      })}\n    </div>\n  );\n}\n\n// \u2500\u2500 Tasks tab (weekday + friday) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction TasksTab({ state, dispatch, undo, canUndo }) {\n  const [listTab, setListTab] = useState(\"weekday\");\n  const [schedKid, setSchedKid] = useState(\"oliver\");\n  const [newName, setNewName] = useState(\"\");\n  const [newSec, setNewSec] = useState(\"Morning\");\n  const [newType, setNewType] = useState(\"chore\");\n  const [editId, setEditId] = useState(null);\n  const [editName, setEditName] = useState(\"\");\n  const [editSec, setEditSec] = useState(\"\");\n  const [editType, setEditType] = useState(\"chore\");\n  const [editCanGround, setEditCanGround] = useState(false);\n  const [newCanGround, setNewCanGround] = useState(false);\n  const [selected, setSelected] = useState(new Set());\n  const [selectMode, setSelectMode] = useState(false);\n\n  useEffect(() => { setSelected(new Set()); setSelectMode(false); }, [listTab, schedKid]);\n  const isFri = listTab === \"friday\";\n  const isSat = listTab === \"saturday\";\n  const isSun = listTab === \"sunday\";\n  const isWknd = isSat || isSun;\n  const rawTasks = isSat ? (state.saturdayTasks || {}) : isSun ? (state.sundayTasks || {}) : isFri ? state.fridayTasks : state.tasks;\n  const tasks = rawTasks?.[schedKid] || [];\n  const [copyDayFrom, setCopyDayFrom] = useState(\"\");\n  const [showCopyDay, setShowCopyDay] = useState(false);\n  const inp = { padding: \"8px 10px\", borderRadius: 8, border: \"1px solid #ddd\", fontSize: 13, width: \"100%\", marginBottom: 8 };\n  const btn = (extra={}) => ({ padding: \"7px 13px\", borderRadius: 8, border: \"1px solid #ddd\", background: \"transparent\", cursor: \"pointer\", fontSize: 13, ...extra });\n\n  const startEdit = t => { setEditId(t.id); setEditName(t.name); setEditSec(t.section); setEditType(t.schedule ? \"schedule\" : \"chore\"); setEditCanGround(t.canGround || false); };\n  const saveEdit = () => { dispatch({ type: \"EDIT_TASK\", id: editId, name: editName.trim()||\"(unnamed)\", section: editSec, schedule: editType===\"schedule\", canGround: editType===\"schedule\" && editCanGround, isFriday: isFri, isSaturday: isSat, isSunday: isSun, kid: schedKid }); setEditId(null); };\n\n  const moveTask = (i, dir) => {\n    const newIdx = i + dir;\n    if (newIdx < 0 || newIdx >= tasks.length) return;\n    dispatch({ type: \"REORDER_TASKS\", fromIndex: i, toIndex: newIdx, isFriday: isFri, isSaturday: isSat, isSunday: isSun, kid: schedKid });\n  };\n\n  return (\n    <div>\n      <div style={{ display: \"flex\", gap: 4, marginBottom: 8, flexWrap: \"wrap\" }}>\n        {[[\"weekday\",\"Mon\u2013Thu\"],[\"friday\",\"Fri\"],[\"saturday\",\"Sat\"],[\"sunday\",\"Sun\"]].map(([id,lbl]) => (\n          <button key={id} onClick={() => { setListTab(id); setShowCopyDay(false); }} style={{\n            flex: 1, padding: \"8px 4px\", borderRadius: 10, fontSize: 12, fontWeight: 600, cursor: \"pointer\",\n            border: `2px solid ${listTab===id ? \"#7F77DD\" : \"transparent\"}`,\n            background: listTab===id ? \"#EEEDFE\" : \"#f5f5f5\", color: listTab===id ? \"#3C3489\" : \"#888\",\n          }}>{lbl}</button>\n        ))}\n      </div>\n      <div style={{ display: \"flex\", gap: 8, marginBottom: 10 }}>\n        {[\"oliver\",\"alfie\"].map(id => (\n          <button key={id} onClick={() => setSchedKid(id)} style={{\n            flex: 1, padding: \"7px\", borderRadius: 10, fontSize: 13, fontWeight: 600, cursor: \"pointer\",\n            border: `2px solid ${schedKid===id ? KIDS[id].accent : \"transparent\"}`,\n            background: KIDS[id].light, color: KIDS[id].dark,\n          }}>{KIDS[id].label}</button>\n        ))}\n      </div>\n      <div style={{ display: \"flex\", justifyContent: \"space-between\", alignItems: \"center\", marginBottom: 8 }}>\n        <span style={{ fontSize: 11, color: \"#aaa\" }}>\u283f Drag to reorder</span>\n        <div style={{ display: \"flex\", gap: 6 }}>\n          {canUndo && (\n            <button onClick={undo} style={{ padding: \"5px 10px\", borderRadius: 8, border: \"1px solid #ddd\", background: \"#f9f9f9\", cursor: \"pointer\", fontSize: 11, color: \"#333\", fontWeight: 600 }}>\n              \u21a9 Undo\n            </button>\n          )}\n        </div>\n      </div>\n      {/* Copy toolbar */}\n      <div style={{ display: \"flex\", gap: 6, marginBottom: 10, flexWrap: \"wrap\" }}>\n        <button onClick={() => {\n          const other = schedKid === \"oliver\" ? \"alfie\" : \"oliver\";\n          dispatch({ type: \"COPY_SCHEDULE\", fromKid: schedKid, toKid: other, isFriday: isFri });\n        }} style={{ padding: \"5px 10px\", borderRadius: 8, border: \"1px solid #ddd\", background: \"transparent\", cursor: \"pointer\", fontSize: 11, color: \"#534AB7\" }}>\n          Copy all to {schedKid === \"oliver\" ? \"Alfie\" : \"Oliver\"} \u2192\n        </button>\n        <button onClick={() => setShowCopyDay(s => !s)}\n          style={{ padding: \"5px 10px\", borderRadius: 8, border: `1px solid ${showCopyDay ? \"#7F77DD\" : \"#ddd\"}`,\n            background: showCopyDay ? \"#EEEDFE\" : \"transparent\", cursor: \"pointer\", fontSize: 11,\n            color: showCopyDay ? \"#534AB7\" : \"#555\" }}>\n          Copy from another day\n        </button>\n        <button onClick={() => { setSelectMode(s => !s); setSelected(new Set()); }}\n          style={{ padding: \"5px 10px\", borderRadius: 8, border: `1px solid ${selectMode ? \"#7F77DD\" : \"#ddd\"}`,\n            background: selectMode ? \"#EEEDFE\" : \"transparent\", cursor: \"pointer\", fontSize: 11,\n            color: selectMode ? \"#534AB7\" : \"#555\", fontWeight: selectMode ? 600 : 400 }}>\n          {selectMode ? \"\u2715 Cancel select\" : \"Select tasks to copy\"}\n        </button>\n        {selectMode && selected.size > 0 && (\n          <button onClick={() => {\n            const other = schedKid === \"oliver\" ? \"alfie\" : \"oliver\";\n            dispatch({ type: \"COPY_TASKS\", fromKid: schedKid, toKid: other, isFriday: isFri, isSaturday: isSat, isSunday: isSun, ids: [...selected] });\n            setSelectMode(false); setSelected(new Set());\n          }} style={{ padding: \"5px 10px\", borderRadius: 8, border: \"1px solid #7F77DD\", background: \"#7F77DD\",\n            cursor: \"pointer\", fontSize: 11, color: \"#fff\", fontWeight: 600 }}>\n            Copy {selected.size} task{selected.size > 1 ? \"s\" : \"\"} to {schedKid === \"oliver\" ? \"Alfie\" : \"Oliver\"} \u2192\n          </button>\n        )}\n      </div>\n      {selectMode && <div style={{ fontSize: 11, color: \"#888\", marginBottom: 8 }}>Tap tasks to select them, then copy to the other kid</div>}\n      {showCopyDay && (\n        <div style={{ background: \"#f7f7ff\", border: \"1px solid #e8e5ff\", borderRadius: 10, padding: \"10px 12px\", marginBottom: 10 }}>\n          <div style={{ fontSize: 12, color: \"#534AB7\", marginBottom: 8, fontWeight: 600 }}>Copy schedule from another day to {listTab === \"saturday\" ? \"Saturday\" : listTab === \"sunday\" ? \"Sunday\" : listTab === \"friday\" ? \"Friday\" : \"Mon\u2013Thu\"}:</div>\n          <div style={{ display: \"flex\", gap: 6, flexWrap: \"wrap\" }}>\n            {[[\"weekday\",\"Mon\u2013Thu\"],[\"friday\",\"Friday\"],[\"saturday\",\"Saturday\"],[\"sunday\",\"Sunday\"]].filter(([id]) => id !== listTab).map(([id,lbl]) => (\n              <button key={id} onClick={() => { dispatch({ type: \"COPY_DAY_SCHEDULE\", fromDay: id, toDay: listTab, kid: schedKid }); setShowCopyDay(false); }}\n                style={{ padding: \"6px 12px\", borderRadius: 8, background: \"#7F77DD\", color: \"#fff\", border: \"none\", cursor: \"pointer\", fontSize: 12, fontWeight: 600 }}>\n                \u2190 {lbl}\n              </button>\n            ))}\n          </div>\n          <div style={{ fontSize: 11, color: \"#888\", marginTop: 6 }}>This replaces the current {listTab} schedule for {KIDS[schedKid].label}</div>\n        </div>\n      )}\n\n      {tasks.map((t, i) => (\n        editId === t.id ? (\n          <div key={t.id} style={{ background: \"#f9f9f9\", border: \"1px solid #e0e0e0\", borderRadius: 10, padding: 12, marginBottom: 6 }}>\n            <input value={editName} onChange={e => setEditName(e.target.value)} style={{ ...inp, marginBottom: 6 }} />\n            <div style={{ display: \"flex\", gap: 8, marginBottom: 8 }}>\n              <select value={editSec} onChange={e => setEditSec(e.target.value)} style={{ flex: 1, padding: \"7px 10px\", borderRadius: 8, border: \"1px solid #ddd\", fontSize: 13 }}>\n                {[\"Morning\",\"Afternoon\",\"Evening\"].map(s => <option key={s}>{s}</option>)}\n              </select>\n              <select value={editType} onChange={e => setEditType(e.target.value)} style={{ flex: 1, padding: \"7px 10px\", borderRadius: 8, border: \"1px solid #ddd\", fontSize: 13 }}>\n                <option value=\"chore\">Chore (1pt)</option><option value=\"schedule\">Schedule (no pts)</option>\n              </select>\n            </div>\n            {editType === \"schedule\" && (\n              <label style={{ display: \"flex\", alignItems: \"center\", gap: 8, fontSize: 13, marginBottom: 8, cursor: \"pointer\" }}>\n                <input type=\"checkbox\" checked={editCanGround} onChange={e => setEditCanGround(e.target.checked)} />\n                \ud83d\udeab Allow grounding (shows Ground button on this item)\n              </label>\n            )}\n            <div style={{ display: \"flex\", gap: 8 }}>\n              <button onClick={saveEdit} style={{ padding: \"7px 14px\", borderRadius: 8, background: \"#7F77DD\", color: \"#fff\", border: \"none\", cursor: \"pointer\", fontSize: 13 }}>Save</button>\n              <button onClick={() => setEditId(null)} style={btn()}>Cancel</button>\n            </div>\n          </div>\n        ) : (\n          <div key={t.id}\n            onClick={() => selectMode && setSelected(s => { const n = new Set(s); n.has(t.id) ? n.delete(t.id) : n.add(t.id); return n; })}\n            style={{ display: \"flex\", alignItems: \"center\", gap: 8, padding: \"9px 12px\",\n              border: selected.has(t.id) ? \"2px solid #7F77DD\" : t.schedule ? `1px solid ${SCHED.border}` : \"1px solid #eee\",\n              background: selected.has(t.id) ? \"#EEEDFE\" : t.schedule ? SCHED.bg : \"#fff\",\n              borderRadius: 10, marginBottom: 5, fontSize: 13,\n              cursor: selectMode ? \"pointer\" : \"default\",\n            }}>\n            {selectMode\n              ? <div style={{ width: 18, height: 18, borderRadius: 4, border: `2px solid ${selected.has(t.id) ? \"#7F77DD\" : \"#ccc\"}`,\n                  background: selected.has(t.id) ? \"#7F77DD\" : \"transparent\", flexShrink: 0, display: \"flex\", alignItems: \"center\", justifyContent: \"center\" }}>\n                  {selected.has(t.id) && <span style={{ color: \"#fff\", fontSize: 11 }}>\u2713</span>}\n                </div>\n              : <div style={{ display: \"flex\", flexDirection: \"column\", gap: 1, flexShrink: 0 }}>\n                  <button onClick={() => moveTask(i, -1)} disabled={i === 0}\n                    style={{ width: 22, height: 22, borderRadius: 4, border: \"1px solid #ddd\", background: i===0?\"#f5f5f5\":\"#fff\", cursor: i===0?\"default\":\"pointer\", fontSize: 11, color: i===0?\"#ccc\":\"#555\", display:\"flex\",alignItems:\"center\",justifyContent:\"center\" }}>\u25b2</button>\n                  <button onClick={() => moveTask(i, 1)} disabled={i === tasks.length-1}\n                    style={{ width: 22, height: 22, borderRadius: 4, border: \"1px solid #ddd\", background: i===tasks.length-1?\"#f5f5f5\":\"#fff\", cursor: i===tasks.length-1?\"default\":\"pointer\", fontSize: 11, color: i===tasks.length-1?\"#ccc\":\"#555\", display:\"flex\",alignItems:\"center\",justifyContent:\"center\" }}>\u25bc</button>\n                </div>\n            }\n            <span style={{ flex: 1, color: t.schedule ? SCHED.text : \"#222\" }}>{t.name}</span>\n            <span style={{ fontSize: 11, color: \"#888\", background: \"#f0f0f0\", padding: \"2px 7px\", borderRadius: 99 }}>{t.section}</span>\n            <span style={{ fontSize: 11, color: t.schedule ? SCHED.icon : \"#888\", background: \"#f0f0f0\", padding: \"2px 7px\", borderRadius: 99 }}>{t.schedule ? \"schedule\" : \"1pt\"}</span>\n            {!selectMode && <button onClick={() => startEdit(t)} style={btn({ padding: \"5px 9px\", fontSize: 12 })}>\u270e</button>}\n            {!selectMode && <button onClick={() => dispatch({ type: \"DELETE_TASK\", id: t.id, isFriday: isFri, isSaturday: isSat, isSunday: isSun, kid: schedKid })}\n              style={btn({ padding: \"5px 9px\", fontSize: 12, border: \"1px solid #f7c1c1\", color: \"#a32d2d\" })}>\ud83d\uddd1</button>}\n          </div>\n        )\n      ))}\n\n      <div style={{ marginTop: 14, padding: 14, background: \"#f7f7ff\", borderRadius: 12, border: \"1px solid #e8e5ff\" }}>\n        <div style={{ fontSize: 13, fontWeight: 600, color: \"#534AB7\", marginBottom: 10 }}>Add task to {KIDS[schedKid].label}'s {isSat ? \"Saturday\" : isSun ? \"Sunday\" : isFri ? \"Friday\" : \"Mon\u2013Thu\"} schedule</div>\n        <input value={newName} onChange={e => setNewName(e.target.value)} placeholder=\"Task name\" style={inp} />\n        <div style={{ display: \"flex\", gap: 8, marginBottom: 10 }}>\n          <select value={newSec} onChange={e => setNewSec(e.target.value)} style={{ flex: 1, padding: \"8px 10px\", borderRadius: 8, border: \"1px solid #ddd\", fontSize: 13 }}>\n            {[\"Morning\",\"Afternoon\",\"Evening\"].map(s => <option key={s}>{s}</option>)}\n          </select>\n          <select value={newType} onChange={e => setNewType(e.target.value)} style={{ flex: 1, padding: \"8px 10px\", borderRadius: 8, border: \"1px solid #ddd\", fontSize: 13 }}>\n            <option value=\"chore\">Chore (1pt)</option><option value=\"schedule\">Schedule (no pts)</option>\n          </select>\n        </div>\n        {newType === \"schedule\" && (\n          <label style={{ display: \"flex\", alignItems: \"center\", gap: 8, fontSize: 13, marginBottom: 10, cursor: \"pointer\" }}>\n            <input type=\"checkbox\" checked={newCanGround} onChange={e => setNewCanGround(e.target.checked)} />\n            \ud83d\udeab Allow grounding (shows Ground button on this item)\n          </label>\n        )}\n        <button onClick={() => { if (!newName.trim()) return; dispatch({ type: \"ADD_TASK\", name: newName.trim(), section: newSec, schedule: newType===\"schedule\", canGround: newType===\"schedule\" && newCanGround, isFriday: isFri, isSaturday: isSat, isSunday: isSun, kid: schedKid }); setNewName(\"\"); setNewCanGround(false); }}\n          style={{ padding: \"8px 16px\", borderRadius: 8, background: \"#7F77DD\", color: \"#fff\", border: \"none\", cursor: \"pointer\", fontSize: 13, fontWeight: 600 }}>\n          + Add task\n        </button>\n      </div>\n    </div>\n  );\n}\n\n\n\n\n// \u2500\u2500 Kid history view \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction KidHistory({ kid, state, k }) {\n  const [expanded, setExpanded] = useState(false);\n  const history = state.history || [];\n  if (!history.length) return null;\n\n  const { target = 65, amount = 10, minPts = 45 } = state.rewards || {};\n  const rate = amount / target;\n\n  return (\n    <div style={{ marginTop: 20, paddingTop: 16, borderTop: \"1.5px solid #f0f0f0\" }}>\n      <button onClick={() => setExpanded(e => !e)} style={{\n        width: \"100%\", display: \"flex\", justifyContent: \"space-between\", alignItems: \"center\",\n        background: \"none\", border: \"none\", cursor: \"pointer\", padding: 0, marginBottom: expanded ? 12 : 0,\n      }}>\n        <span style={{ fontSize: 13, fontWeight: 700, color: k.dark }}>\ud83d\udcdc Past weeks</span>\n        <span style={{ fontSize: 12, color: \"#aaa\" }}>{expanded ? \"\u25b2 hide\" : \"\u25bc show\"}</span>\n      </button>\n\n      {expanded && [...history].reverse().map((h, i) => {\n        const pts = kid === \"oliver\" ? (h.oliverPts || 0) : (h.alfiePts || 0);\n        const earned = pts < minPts ? 0 : pts <= target\n          ? parseFloat((pts / target * amount).toFixed(2))\n          : parseFloat((amount + (pts - target) / target * amount).toFixed(2));\n        const bonusPaid = pts > target ? parseFloat(((pts - target) * rate).toFixed(2)) : 0;\n        return (\n          <div key={i} style={{\n            display: \"flex\", alignItems: \"center\", justifyContent: \"space-between\",\n            padding: \"10px 14px\", marginBottom: 6, borderRadius: 12,\n            background: earned > 0 ? k.light : \"#f5f5f5\",\n            border: `1px solid ${earned > 0 ? k.accent + \"40\
